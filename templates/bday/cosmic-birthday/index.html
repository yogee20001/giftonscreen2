<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Birthday</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --deep-space: #050510;
            --midnight-purple: #1a0a2e;
            --nebula-pink: #ff1493;
            --nebula-cyan: #00ffff;
            --star-white: #ffffff;
            --star-blue: #87ceeb;
            --gold: #ffd700;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--deep-space);
            font-family: 'Outfit', sans-serif;
        }

        #game-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #030005;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 800px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #050510 0%, #0a0520 30%, #150830 60%, #050510 100%);
        }

        @media (min-width: 800px) {
            #game-frame {
                max-width: 450px;
                max-height: 800px;
                border-radius: 20px;
                box-shadow: 0 0 60px rgba(138, 43, 226, 0.3), 0 0 120px rgba(0, 255, 255, 0.1);
            }
        }

        /* Canvas Layers */
        .canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #background-canvas {
            z-index: 1;
        }

        #nebula-canvas {
            z-index: 2;
        }

        #stars-far-canvas {
            z-index: 3;
        }

        #stars-mid-canvas {
            z-index: 4;
        }

        #stars-near-canvas {
            z-index: 5;
        }

        #vortex-canvas {
            z-index: 6;
        }

        #interaction-canvas {
            z-index: 7;
        }

        #portrait-canvas {
            z-index: 8;
        }

        #effects-canvas {
            z-index: 9;
        }

        #bloom-layer {
            z-index: 10;
            mix-blend-mode: screen;
            filter: blur(8px) brightness(1.5);
            opacity: 0.6;
            pointer-events: none;
        }

        #ui-canvas {
            z-index: 11;
        }

        /* Interactive Layer */
        #interaction-layer {
            position: absolute;
            top: 18%;
            left: 4%;
            width: 92%;
            height: 64%;
            z-index: 10;
            cursor: grab;
            touch-action: none;
        }

        #interaction-layer:active {
            cursor: grabbing;
        }

        /* UI Elements */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Intro Text */
        .intro-text {
            position: absolute;
            top: 14%;
            width: 70%;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .intro-text.visible {
            opacity: 1;
        }

        .intro-text p {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 0 20px rgba(135, 206, 235, 0.5);
            line-height: 1.6;
        }

        /* Instruction Text */
        .instruction-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80%;
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .instruction-text.visible {
            opacity: 1;
        }

        .instruction-text p {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .swipe-icon {
            width: 60px;
            height: 60px;
            margin: 20px auto 0;
            animation: swipeHint 2s ease-in-out infinite;
        }

        .swipe-icon svg {
            width: 100%;
            height: 100%;
            fill: rgba(255, 255, 255, 0.5);
        }

        @keyframes swipeHint {

            0%,
            100% {
                transform: translateX(-10px);
                opacity: 0.5;
            }

            50% {
                transform: translateX(10px);
                opacity: 1;
            }
        }

        /* Birthday Message */
        .birthday-message {
            position: absolute;
            bottom: 18%;
            width: 80%;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .birthday-message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .birthday-message h1 {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        /* Final Message */
        .final-message {
            position: absolute;
            bottom: 28%;
            width: 85%;
            text-align: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .final-message.visible {
            opacity: 1;
        }

        .final-message p {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
            line-height: 1.5;
        }

        /* Sender Name */
        .sender-name {
            position: absolute;
            bottom: 8%;
            width: 100%;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .sender-name.visible {
            opacity: 1;
        }

        .sender-name p {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }

        /* Progress Indicator */
        .progress-bar {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--nebula-cyan), var(--nebula-pink));
            border-radius: 2px;
            transition: width 0.3s linear;
        }

        /* Scene visibility */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .scene.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Hidden elements for data */
        [data-receiver],
        [data-sender],
        [data-message],
        [data-photo] {
            display: none;
        }
    </style>
</head>

<body>
    <div id="game-wrapper">
        <div id="game-frame">
            <!-- Canvas Layers -->
            <canvas id="background-canvas" class="canvas-layer"></canvas>
            <canvas id="nebula-canvas" class="canvas-layer"></canvas>
            <canvas id="stars-far-canvas" class="canvas-layer"></canvas>
            <canvas id="stars-mid-canvas" class="canvas-layer"></canvas>
            <canvas id="stars-near-canvas" class="canvas-layer"></canvas>
            <canvas id="vortex-canvas" class="canvas-layer"></canvas>
            <canvas id="interaction-canvas" class="canvas-layer"></canvas>
            <canvas id="portrait-canvas" class="canvas-layer"></canvas>
            <canvas id="effects-canvas" class="canvas-layer"></canvas>
            <canvas id="bloom-layer" class="canvas-layer"></canvas>
            <canvas id="ui-canvas" class="canvas-layer"></canvas>

            <!-- Interaction Zone -->
            <div id="interaction-layer"></div>

            <!-- UI Layer -->
            <div class="ui-layer">
                <!-- Intro Text -->
                <div class="intro-text" id="intro-text">
                    <p>Every star holds a birthday wish...</p>
                </div>

                <!-- Instruction -->
                <div class="instruction-text" id="instruction-text">
                    <p>Swipe to awaken the stars</p>
                    <div class="swipe-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 5v2h6.59L4 18.59 5.41 20 17 8.41V15h2V5z" />
                        </svg>
                    </div>
                </div>

                <!-- Birthday Message -->
                <div class="birthday-message" id="birthday-message">
                    <h1 data-receiver>Happy Birthday, Alex!</h1>
                </div>

                <!-- Final Message -->
                <div class="final-message" id="final-message">
                    <p>The universe celebrates you today.</p>
                </div>

                <!-- Sender -->
                <div class="sender-name" id="sender-name">
                    <p data-sender></p>
                </div>

                <!-- Progress -->
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // ============================================
        // COSMIC BIRTHDAY - Main Script
        // ============================================

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDDnD8UUvRJnjwU9-Ee2-5uh0ybG7pkutE",
            authDomain: "giftonscreen.firebaseapp.com",
            projectId: "giftonscreen",
            storageBucket: "giftonscreen.firebasestorage.app",
            messagingSenderId: "984262120605",
            appId: "1:984262120605:web:df7aa8c601c2f7f10bf074"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Canvas Setup
        const canvasIds = [
            'background-canvas', 'nebula-canvas',
            'stars-far-canvas', 'stars-mid-canvas', 'stars-near-canvas',
            'vortex-canvas', 'interaction-canvas', 'portrait-canvas',
            'effects-canvas', 'bloom-layer', 'ui-canvas'
        ];
        const canvases = {};
        const ctxs = {};

        canvasIds.forEach(id => {
            canvases[id] = document.getElementById(id);
            ctxs[id] = canvases[id].getContext('2d', { alpha: id !== 'background-canvas' });
        });

        let width, height;
        let dpr = window.devicePixelRatio || 1;

        function resizeCanvases() {
            const frame = document.getElementById('game-frame');
            width = frame.clientWidth;
            height = frame.clientHeight;

            canvasIds.forEach(id => {
                canvases[id].width = width * dpr;
                canvases[id].height = height * dpr;
                canvases[id].style.width = `${width}px`;
                canvases[id].style.height = `${height}px`;
                ctxs[id].setTransform(dpr, 0, 0, dpr, 0, 0);
            });
        }

        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        // Cinematic Camera
        const camera = {
            x: 0,
            y: 0,
            zoom: 1,
            targetZoom: 1,
            shake: 0,
            driftX: 0,
            driftY: 0,
            update(time) {
                // Subtle floating drift
                this.driftX = Math.sin(time * 0.0005) * 15;
                this.driftY = Math.cos(time * 0.0007) * 10;

                // Smooth zoom easing
                this.zoom += (this.targetZoom - this.zoom) * 0.02;

                if (this.shake > 0) {
                    this.x = (Math.random() - 0.5) * this.shake;
                    this.y = (Math.random() - 0.5) * this.shake;
                    this.shake *= 0.9;
                } else {
                    this.x = this.driftX;
                    this.y = this.driftY;
                }
            },
            apply(ctx, parallax = 1) {
                ctx.save();
                ctx.translate(width / 2, height / 2);
                ctx.scale(this.zoom, this.zoom);
                ctx.translate(-width / 2 + this.x * parallax, -height / 2 + this.y * parallax);
            },
            restore(ctx) {
                ctx.restore();
            }
        };

        // ============================================
        // Data Management
        // ============================================

        function getGiftData() {
            if (window.GOS_DATA) return window.GOS_DATA;

            const params = new URLSearchParams(window.location.search);
            return {
                receiver: params.get('name') || 'Alex',
                sender: params.get('from') || 'Your Friend',
                message: params.get('msg') || 'The universe celebrates you today.',
                photoUrl: params.get('photo') || null
            };
        }

        function displayData() {
            const data = getGiftData();

            document.querySelectorAll('[data-receiver]').forEach(el => {
                el.textContent = `Happy Birthday, ${data.receiver}!`;
            });
            document.querySelectorAll('[data-sender]').forEach(el => {
                el.textContent = `— ${data.sender}`;
            });
            document.querySelectorAll('[data-message]').forEach(el => {
                el.textContent = data.message;
            });
        }

        // Fetch from Firestore
        async function fetchFromFirestore() {
            const params = new URLSearchParams(window.location.search);
            const giftId = params.get('id');
            if (!giftId) return;

            try {
                const doc = await db.collection('gifts').doc(giftId).get();
                if (doc.exists) {
                    const d = doc.data();
                    window.GOS_DATA = {
                        receiver: d.receiver || d.receiverName,
                        sender: d.sender || d.senderName,
                        message: d.message,
                        photoUrl: d.photoUrl || d.photoURL
                    };
                    displayData();
                }
            } catch (e) {
                console.log('Firestore fetch failed, using defaults');
                displayData();
            }
        }

        // ============================================
        // Particle System
        // ============================================

        class Particle {
            constructor(x, y, options = {}) {
                this.x = x;
                this.y = y;
                this.vx = options.vx || 0;
                this.vy = options.vy || 0;
                this.size = options.size || 2;
                this.color = options.color || '#ffffff';
                this.alpha = options.alpha || 1;
                this.decay = options.decay || 0.02;
                this.life = options.life || 1;
                this.glow = options.glow || false;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.alpha = Math.max(0, this.life);
                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;

                if (this.glow) {
                    ctx.shadowBlur = this.size * 3;
                    ctx.shadowColor = this.color;
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ============================================
        // Star Classes
        // ============================================

        class Star {
            constructor(layer) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.layer = layer; // 0: far, 1: mid, 2: near

                if (layer === 0) {
                    this.baseSize = 0.5 + Math.random() * 0.5;
                    this.speed = 0.2;
                    this.alpha = 0.2 + Math.random() * 0.3;
                    this.glow = false;
                } else if (layer === 1) {
                    this.baseSize = 1 + Math.random() * 1;
                    this.speed = 0.5;
                    this.alpha = 0.4 + Math.random() * 0.4;
                    this.glow = true;
                } else {
                    this.baseSize = 1.5 + Math.random() * 1.5;
                    this.speed = 0.8;
                    this.alpha = 0.6 + Math.random() * 0.4;
                    this.glow = true;
                }

                this.size = this.baseSize;
                this.twinkleSpeed = 0.01 + Math.random() * 0.03;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.activated = false;
                this.activationTime = 0;
            }

            activate() {
                if (!this.activated) {
                    this.activated = true;
                    this.activationTime = Date.now();
                    return true;
                }
                return false;
            }

            update(time) {
                const twinkle = Math.sin(time * this.twinkleSpeed + this.twinkleOffset);
                this.currentAlpha = this.alpha * (0.7 + twinkle * 0.3);

                if (this.activated) {
                    const elapsed = Date.now() - this.activationTime;
                    const burst = Math.max(0, 1 - elapsed / 500);
                    this.size = this.baseSize + burst * 5 + (this.layer === 2 ? 1 : 0);
                    this.currentAlpha = Math.min(1, this.currentAlpha + burst);
                }
            }

            draw(ctx) {
                ctx.globalAlpha = this.currentAlpha;
                ctx.fillStyle = this.activated ? '#87ceeb' : '#ffffff';

                // Draw glow
                if (this.glow || this.activated) {
                    ctx.shadowBlur = this.activated ? 20 : this.size * 3;
                    ctx.shadowColor = this.activated ? '#00ffff' : '#ffffff';
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Add a tiny cross flair for near bright stars
                if (this.layer === 2 && this.alpha > 0.8) {
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.currentAlpha * 0.5})`;
                    const flair = this.size * 3;
                    ctx.beginPath();
                    ctx.moveTo(this.x - flair, this.y);
                    ctx.lineTo(this.x + flair, this.y);
                    ctx.moveTo(this.x, this.y - flair);
                    ctx.lineTo(this.x, this.y + flair);
                    ctx.stroke();
                }

                ctx.shadowBlur = 0;
            }
        }

        // ============================================
        // Scene Management
        // ============================================

        const SceneState = {
            SCENE_1: 'scene1',
            SCENE_2: 'scene2',
            SCENE_3: 'scene3',
            SCENE_4: 'scene4',
            SCENE_5: 'scene5',
            SCENE_6: 'scene6'
        };

        let currentScene = SceneState.SCENE_1;
        let sceneStartTime = 0;
        let totalTime = 0;
        let animationId = null;

        // ============================================
        // Stars Array
        // ============================================

        let stars = [];
        let activatedStars = [];
        let vortexParticles = [];
        let portraitParticles = [];
        let celebrationParticles = [];
        let swipeTrail = [];
        let isSwiping = false;
        let lastSwipePos = { x: 0, y: 0 };

        let vortexAngle = 0;
        let vortexZoom = 1;
        let vortexBrightness = 0;
        let collapseProgress = 0;

        // ============================================
        // Initialize Stars
        // ============================================

        function initStars() {
            stars = [[], [], []]; // Three layers

            // Far stars (high density)
            for (let i = 0; i < 400; i++) stars[0].push(new Star(0));
            // Mid stars
            for (let i = 0; i < 150; i++) stars[1].push(new Star(1));
            // Near stars (low density, strong parallax)
            for (let i = 0; i < 50; i++) stars[2].push(new Star(2));
        }

        // ============================================
        // Background & Nebula
        // ============================================

        function drawBackground() {
            const ctx = ctxs['background-canvas'];
            ctx.clearRect(0, 0, width, height);

            // Deep space gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#020205');
            gradient.addColorStop(0.5, '#050510');
            gradient.addColorStop(1, '#020205');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Add ultra-subtle film grain noise for realism
            ctx.globalAlpha = 0.03;
            for (let i = 0; i < 1000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
                ctx.fillRect(Math.random() * width, Math.random() * height, 1, 1);
            }
            ctx.globalAlpha = 1.0;
        }

        function drawNebula(time) {
            const ctx = ctxs['nebula-canvas'];
            ctx.clearRect(0, 0, width, height);

            // Set global composite for ethereal light blending
            ctx.globalCompositeOperation = 'screen';

            const driftX = Math.sin(time * 0.0002) * 40;
            const driftY = Math.cos(time * 0.0003) * 30;

            // Nebula Cloud 1: Deep Violet
            const grad1 = ctx.createRadialGradient(
                width * 0.3 + driftX, height * 0.4 + driftY, 0,
                width * 0.3 + driftX, height * 0.4 + driftY, width * 0.8
            );
            grad1.addColorStop(0, 'rgba(100, 30, 200, 0.25)');
            grad1.addColorStop(0.5, 'rgba(80, 20, 160, 0.12)');
            grad1.addColorStop(1, 'transparent');
            ctx.fillStyle = grad1;
            ctx.fillRect(0, 0, width, height);

            // Nebula Cloud 2: Cosmic Cyan
            const grad2 = ctx.createRadialGradient(
                width * 0.7 - driftX, height * 0.6 - driftY, 0,
                width * 0.7 - driftX, height * 0.6 - driftY, width * 0.7
            );
            grad2.addColorStop(0, 'rgba(0, 200, 255, 0.15)');
            grad2.addColorStop(0.5, 'rgba(0, 150, 200, 0.08)');
            grad2.addColorStop(1, 'transparent');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, 0, width, height);

            // Dynamic Halo for bright stars in the viewport
            // (Simple approximation by adding a faint center glow)
            const centerGlow = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, width);
            centerGlow.addColorStop(0, 'rgba(138, 43, 226, 0.05)');
            centerGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = centerGlow;
            ctx.fillRect(0, 0, width, height);

            ctx.globalCompositeOperation = 'source-over';
        }

        // ============================================
        // Star Field Rendering
        // ============================================

        function drawStars(time) {
            const layerIds = ['stars-far-canvas', 'stars-mid-canvas', 'stars-near-canvas'];
            const parallaxLevels = [0.2, 0.5, 1.2];

            layerIds.forEach((id, idx) => {
                const ctx = ctxs[id];
                ctx.clearRect(0, 0, width, height);
                camera.apply(ctx, parallaxLevels[idx]);

                stars[idx].forEach(star => {
                    star.update(time);
                    star.draw(ctx);
                });

                camera.restore(ctx);
            });
        }

        // ============================================
        // Interaction Handling
        // ============================================

        function handleSwipe(x, y) {
            if (currentScene !== SceneState.SCENE_2) return;

            const dx = x - lastSwipePos.x;
            const dy = y - lastSwipePos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 5) {
                // Add cinematic trailing particles
                for (let i = 0; i < 2; i++) {
                    swipeTrail.push(new Particle(x + (Math.random() - 0.5) * 10, y + (Math.random() - 0.5) * 10, {
                        vx: dx * 0.2 + (Math.random() - 0.5) * 2,
                        vy: dy * 0.2 + (Math.random() - 0.5) * 2,
                        size: 1 + Math.random() * 3,
                        color: Math.random() > 0.5 ? '#00ffff' : '#ffffff',
                        alpha: 0.9,
                        decay: 0.03,
                        glow: true
                    }));
                }

                // Activate nearby stars across all layers
                stars.forEach((layer, lIdx) => {
                    layer.forEach(star => {
                        // Project star position relative to camera and parallax
                        const pLevel = [0.2, 0.5, 1.2][lIdx];
                        const starCamX = star.x + camera.x * pLevel;
                        const starCamY = star.y + camera.y * pLevel;

                        const starDx = starCamX - x;
                        const starDy = starCamY - y;
                        const starDist = Math.sqrt(starDx * starDx + starDy * starDy);

                        if (starDist < 60 && !star.activated) {
                            if (star.activate()) {
                                activatedStars.push(star);
                                camera.shake = Math.min(camera.shake + 1, 10);

                                // Cinematic Burst
                                for (let i = 0; i < 8; i++) {
                                    const angle = Math.random() * Math.PI * 2;
                                    const speed = 1 + Math.random() * 4;
                                    swipeTrail.push(new Particle(starCamX, starCamY, {
                                        vx: Math.cos(angle) * speed,
                                        vy: Math.sin(angle) * speed,
                                        size: 1 + Math.random() * 2,
                                        color: '#00ffff',
                                        alpha: 1,
                                        decay: 0.04,
                                        glow: true
                                    }));
                                }
                            }
                        }
                    });
                });

                lastSwipePos.x = x;
                lastSwipePos.y = y;
            }
        }

        function drawSwipeTrail(ctx) {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';
            swipeTrail = swipeTrail.filter(p => p.update());
            swipeTrail.forEach(p => p.draw(ctx));
            ctx.globalCompositeOperation = 'source-over';
        }

        function updateBloom() {
            const bloomCtx = ctxs['bloom-layer'];
            bloomCtx.clearRect(0, 0, width, height);

            // Composite bright layers into bloom
            const activeLayers = [
                canvases['stars-near-canvas'],
                canvases['vortex-canvas'],
                canvases['interaction-canvas'],
                canvases['effects-canvas']
            ];

            bloomCtx.globalAlpha = 0.5;
            activeLayers.forEach(layer => {
                bloomCtx.drawImage(layer, 0, 0, width, height);
            });
        }

        // Interaction events
        const interactionLayer = document.getElementById('interaction-layer');

        interactionLayer.addEventListener('mousedown', (e) => {
            isSwiping = true;
            const rect = interactionLayer.getBoundingClientRect();
            lastSwipePos.x = e.clientX - rect.left;
            lastSwipePos.y = e.clientY - rect.top;
        });

        interactionLayer.addEventListener('mousemove', (e) => {
            if (!isSwiping) return;
            const rect = interactionLayer.getBoundingClientRect();
            handleSwipe(e.clientX - rect.left, e.clientY - rect.top);
        });

        interactionLayer.addEventListener('mouseup', () => {
            isSwiping = false;
        });

        interactionLayer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isSwiping = true;
            const rect = interactionLayer.getBoundingClientRect();
            const touch = e.touches[0];
            lastSwipePos.x = touch.clientX - rect.left;
            lastSwipePos.y = touch.clientY - rect.top;
        });

        interactionLayer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isSwiping) return;
            const rect = interactionLayer.getBoundingClientRect();
            const touch = e.touches[0];
            handleSwipe(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        interactionLayer.addEventListener('touchend', () => {
            isSwiping = false;
        });

        // ============================================
        // Vortex System
        // ============================================

        function initVortex() {
            vortexParticles = [];
            const centerX = width / 2;
            const centerY = height / 2;
            // High count for cinematic feel
            const particleCount = 2500;

            for (let i = 0; i < particleCount; i++) {
                // Distributed in spiral arms
                const arm = Math.floor(Math.random() * 3);
                const armAngle = (arm / 3) * Math.PI * 2;
                const dist = Math.random();
                const radius = 20 + dist * (Math.min(width, height) * 0.5);
                const angle = armAngle + (dist * 4); // Spiral curvature

                vortexParticles.push({
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius,
                    baseAngle: angle,
                    baseRadius: radius,
                    radius: radius,
                    angle: angle,
                    size: 0.5 + Math.random() * 2,
                    speed: 0.8 + Math.random() * 1.5,
                    color: Math.random() > 0.4 ? '#00ffff' : '#ffffff',
                    alpha: 0.3 + Math.random() * 0.7,
                    arm: arm,
                    turbulence: Math.random() * 10
                });
            }
        }

        function updateVortex(deltaTime, time) {
            const centerX = width / 2;
            const centerY = height / 2;

            // Rotational acceleration
            vortexAngle += 0.01 + (vortexZoom * 0.04);

            const zoomFactor = 1 - (vortexZoom * 0.8); // Pull inward

            vortexParticles.forEach(p => {
                // Turbulence near center
                const turb = (1 - p.radius / 500) * p.turbulence * Math.sin(time * 0.001);

                p.angle = p.baseAngle + (vortexAngle * p.speed);
                p.radius = (p.baseRadius * zoomFactor) + turb;

                // Track previous position for motion blur (stretching)
                p.px = p.x;
                p.py = p.y;

                p.x = centerX + Math.cos(p.angle) * p.radius;
                p.y = centerY + Math.sin(p.angle) * p.radius;
            });

            if (currentScene === SceneState.SCENE_3) {
                if (vortexZoom < 1) vortexZoom += 0.0015;
                vortexBrightness = Math.min(1, vortexBrightness + 0.02);

                // Camera push
                camera.targetZoom = 1 + (vortexZoom * 0.5);
            }
        }

        function drawVortex(ctx) {
            if (currentScene !== SceneState.SCENE_3 && currentScene !== SceneState.SCENE_4) return;

            ctx.clearRect(0, 0, width, height);
            camera.apply(ctx);

            ctx.globalCompositeOperation = 'lighter';

            vortexParticles.forEach(p => {
                const alpha = p.alpha * vortexBrightness;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = p.color;
                ctx.lineWidth = p.size;

                // Motion blur stretch
                ctx.beginPath();
                ctx.moveTo(p.px, p.py);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();

                // Head glow
                if (Math.random() > 0.9) {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            ctx.globalCompositeOperation = 'source-over';
            camera.restore(ctx);
        }

        // ============================================
        // Portrait Particle System
        // ============================================

        let portraitImage = null;
        let portraitPoints = [];

        async function createPortraitParticles() {
            const centerX = width / 2;
            const centerY = height / 2;
            const data = getGiftData();

            const portraitWidth = width * 0.6;
            const portraitHeight = portraitWidth * 1.3;
            const particleCount = 4000;
            portraitParticles = [];

            for (let i = 0; i < particleCount; i++) {
                // Initial chaotic position (explosion result)
                const angle = Math.random() * Math.PI * 2;
                const radius = width + Math.random() * width;

                // Target shape
                let tx, ty;
                const dist = Math.random();
                const tAngle = Math.random() * Math.PI * 2;

                // Create a soft rectangular/oval portrait area
                tx = centerX + (Math.random() - 0.5) * portraitWidth;
                ty = centerY + (Math.random() - 0.5) * portraitHeight - 50;

                portraitParticles.push({
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius,
                    targetX: tx,
                    targetY: ty,
                    size: 0.5 + Math.random() * 2,
                    color: Math.random() > 0.3 ? '#ffffff' : '#87ceeb',
                    alpha: 0,
                    speed: 0.01 + Math.random() * 0.02,
                    swirl: 0.02 + Math.random() * 0.05,
                    swirlDir: Math.random() > 0.5 ? 1 : -1,
                    assembled: false,
                    sparkle: Math.random() > 0.95
                });
            }
        }

        function updatePortrait(time) {
            if (currentScene !== SceneState.SCENE_5 && currentScene !== SceneState.SCENE_6) return;

            const centerX = width / 2;
            const centerY = height / 2;

            portraitParticles.forEach((p, i) => {
                if (!p.assembled) {
                    const dx = p.targetX - p.x;
                    const dy = p.targetY - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 2) {
                        // Swirl physics while moving to target
                        const angle = Math.atan2(dy, dx) + p.swirl * p.swirlDir;
                        const v = Math.min(dist * 0.05, 15);
                        p.x += Math.cos(angle) * v;
                        p.y += Math.sin(angle) * v;
                    } else {
                        p.assembled = true;
                    }
                } else {
                    // Micro-shimmer
                    p.x += Math.sin(time * 0.002 + i) * 0.2;
                    p.y += Math.cos(time * 0.002 + i) * 0.2;
                }

                if (p.alpha < 1) p.alpha = Math.min(1, p.alpha + 0.02);
            });
        }

        function drawPortrait(ctx) {
            if (currentScene !== SceneState.SCENE_5 && currentScene !== SceneState.SCENE_6) return;

            ctx.clearRect(0, 0, width, height);
            camera.apply(ctx);

            ctx.globalCompositeOperation = 'lighter';

            portraitParticles.forEach(p => {
                ctx.globalAlpha = p.alpha * 0.8;
                ctx.fillStyle = p.color;

                if (p.sparkle) {
                    const s = p.size * (1 + Math.sin(Date.now() * 0.01) * 2);
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            });

            // Portrait glow outline
            const grad = ctx.createRadialGradient(width / 2, height / 2 - 50, 0, width / 2, height / 2 - 50, width * 0.4);
            grad.addColorStop(0, 'rgba(0, 255, 255, 0.05)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            ctx.globalCompositeOperation = 'source-over';
            camera.restore(ctx);
        }

        // ============================================
        // Celebration Effects
        // ============================================

        function createCelebrationEffect() {
            celebrationParticles = [];
            // Handled in update now for continuous effect
        }

        function updateCelebration(time) {
            if (currentScene !== SceneState.SCENE_6) return;

            // Spawn meteors
            if (Math.random() > 0.95) {
                const side = Math.random() > 0.5 ? 1 : -1;
                celebrationParticles.push({
                    type: 'meteor',
                    x: side > 0 ? -100 : width + 100,
                    y: Math.random() * height * 0.4,
                    vx: side * (10 + Math.random() * 10),
                    vy: 2 + Math.random() * 5,
                    size: 2,
                    color: '#fff',
                    trail: [],
                    alpha: 1
                });
            }

            // Spawn star rain
            if (Math.random() > 0.7) {
                celebrationParticles.push({
                    type: 'rain',
                    x: Math.random() * width,
                    y: -50,
                    vx: (Math.random() - 0.5) * 2,
                    vy: 3 + Math.random() * 4,
                    size: 1 + Math.random() * 2,
                    color: Math.random() > 0.5 ? '#ffd700' : '#00ffff',
                    alpha: 1,
                    wobble: Math.random() * Math.PI * 2
                });
            }

            celebrationParticles.forEach(p => {
                p.x += p.vx || 0;
                p.y += p.vy || 0;

                if (p.type === 'meteor') {
                    p.trail.push({ x: p.x, y: p.y });
                    if (p.trail.length > 20) p.trail.shift();
                }

                if (p.type === 'rain') {
                    p.wobble += 0.1;
                    p.x += Math.sin(p.wobble) * 1;
                }

                p.alpha -= 0.005;
            });

            celebrationParticles = celebrationParticles.filter(p => p.alpha > 0 && p.y < height + 100);
        }

        function drawCelebration(ctx) {
            if (currentScene !== SceneState.SCENE_6) return;

            ctx.clearRect(0, 0, width, height);
            camera.apply(ctx);
            ctx.globalCompositeOperation = 'lighter';

            celebrationParticles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;

                if (p.type === 'meteor') {
                    // Draw trail
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    p.trail.forEach((t, i) => {
                        ctx.lineTo(t.x, t.y);
                        ctx.globalAlpha = p.alpha * (i / p.trail.length);
                        ctx.lineWidth = p.size * (i / p.trail.length);
                        ctx.strokeStyle = '#87ceeb';
                        ctx.stroke();
                    });

                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            ctx.globalCompositeOperation = 'source-over';
            camera.restore(ctx);
        }

        // ============================================
        // UI Updates
        // ============================================

        function updateUI(time) {
            const introText = document.getElementById('intro-text');
            const instructionText = document.getElementById('instruction-text');
            const birthdayMessage = document.getElementById('birthday-message');
            const finalMessage = document.getElementById('final-message');
            const senderName = document.getElementById('sender-name');
            const progressFill = document.getElementById('progress-fill');

            // Update progress
            const progress = Math.min(100, (time / 30000) * 100);
            progressFill.style.width = `${progress}%`;

            // Scene 1: Intro text
            if (time > 500 && time < 4000) {
                introText.classList.add('visible');
            } else if (time >= 4000) {
                introText.classList.remove('visible');
            }

            // Scene 2: Instruction text
            if (time > 4500 && time < 12000) {
                instructionText.classList.add('visible');
            } else if (time >= 12000) {
                instructionText.classList.remove('visible');
            }

            // Scene 5: Birthday message
            if (time > 21000 && time < 25000) {
                birthdayMessage.classList.add('visible');
            }

            // Scene 6: Final message and sender
            if (time > 25000) {
                birthdayMessage.classList.add('visible');
                finalMessage.classList.add('visible');
                senderName.classList.add('visible');
            }
        }

        // ============================================
        // Scene Transitions
        // ============================================

        function transitionToScene(newScene) {
            currentScene = newScene;
            sceneStartTime = totalTime;

            switch (newScene) {
                case SceneState.SCENE_3:
                    initVortex();
                    break;
                case SceneState.SCENE_5:
                    createPortraitParticles();
                    break;
                case SceneState.SCENE_6:
                    createCelebrationEffect();
                    break;
            }
        }

        // ============================================
        // Main Animation Loop
        // ============================================

        let lastTime = 0;

        function animate(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            totalTime += deltaTime;

            // Scene timing
            if (totalTime < 4000) {
                currentScene = SceneState.SCENE_1;
            } else if (totalTime < 12000) {
                currentScene = SceneState.SCENE_2;
            } else if (totalTime < 19000) {
                if (currentScene !== SceneState.SCENE_3) {
                    transitionToScene(SceneState.SCENE_3);
                }
            } else if (totalTime < 20500) {
                if (currentScene !== SceneState.SCENE_4) {
                    transitionToScene(SceneState.SCENE_4);
                }
            } else if (totalTime < 25000) {
                if (currentScene !== SceneState.SCENE_5) {
                    transitionToScene(SceneState.SCENE_5);
                }
            } else {
                if (currentScene !== SceneState.SCENE_6) {
                    transitionToScene(SceneState.SCENE_6);
                }
            }

            // Camera & Post-processing
            camera.update(totalTime);
            updateBloom();

            // Draw layers
            drawBackground();
            drawNebula(totalTime);
            drawStars(totalTime);
            drawSwipeTrail(ctxs['interaction-canvas']);

            if (currentScene === SceneState.SCENE_3 || currentScene === SceneState.SCENE_4) {
                updateVortex(deltaTime, totalTime);
                drawVortex(ctxs['vortex-canvas']);
            }

            if (currentScene === SceneState.SCENE_4) {
                // Vortex collapse - flash effect with cinematic exposure
                const collapseProg = (totalTime - 19000) / 1500;
                const flashAlpha = Math.pow(Math.sin(collapseProg * Math.PI), 3); // Faster peak

                const ctx = ctxs['vortex-canvas'];
                ctx.save();
                ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                ctx.fillRect(0, 0, width, height);

                // Shockwave burst
                if (collapseProg > 0.5 && collapseProg < 0.8) {
                    camera.shake = 30 * (1 - collapseProg);
                    const ringRadius = (collapseProg - 0.5) * 4 * width;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${(0.8 - collapseProg) * 2})`;
                    ctx.lineWidth = 20;
                    ctx.beginPath();
                    ctx.arc(width / 2, height / 2, ringRadius, 0, Math.PI * 2);
                    ctx.stroke();

                    // Radial rays during collapse
                    ctx.lineWidth = 2;
                    for (let r = 0; r < 12; r++) {
                        const rAngle = (r / 12) * Math.PI * 2 + totalTime * 0.001;
                        ctx.beginPath();
                        ctx.moveTo(width / 2, height / 2);
                        ctx.lineTo(width / 2 + Math.cos(rAngle) * width, height / 2 + Math.sin(rAngle) * width);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }

            if (currentScene === SceneState.SCENE_5 || currentScene === SceneState.SCENE_6) {
                updatePortrait(totalTime);
                drawPortrait(ctxs['portrait-canvas']);
            }

            if (currentScene === SceneState.SCENE_6) {
                updateCelebration(totalTime);
                drawCelebration(ctxs['effects-canvas']);
            }

            updateUI(totalTime);

            animationId = requestAnimationFrame(animate);
        }

        // ============================================
        // Initialize
        // ============================================

        window.addEventListener('load', async () => {
            await fetchFromFirestore();
            displayData();
            resizeCanvases();
            initStars();
            animate(0);
        });
    </script>
