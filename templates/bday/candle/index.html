<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Elegant Celebration ✨</title>
    <!-- Google Fonts for Ultra-Premium Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* Ultra-Premium Birthday Experience Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Advanced CSS Variables for Premium Theme */
        :root {
            --bg-dark: #0d0c13;
            --bg-lit: #1a1525;
            --primary-gold: #d4af37;
            --gold-light: #fcf6ba;
            --gold-dark: #b38728;
            --candle-wax: #fff5f5;
            --candle-shadow: rgba(0, 0, 0, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --subtitle-color: #e0e0e0;
            --transition-speed: 0.4s;
            --easing: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --viewport-radius: 24px;
            --viewport-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            --safe-zone: 5%;
        }

        /* High-Performance Body Styles - Decorative Background Layer */
        body {
            background-color: var(--bg-dark);
            overflow: hidden;
            color: var(--text-color);
            width: 100vw;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            transition: background-color 3s var(--easing);
            will-change: background-color;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === DECORATIVE BACKGROUND LAYER (Outside Viewport) === */
        .decorative-bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 20%, rgba(212, 175, 55, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(166, 209, 244, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 182, 193, 0.05) 0%, transparent 70%);
        }

        /* Floating glow orbs - decorative */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            transition: opacity 4s var(--easing), transform 10s ease-in-out infinite alternate;
            will-change: opacity, transform;
            animation: orb-pulse 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.3), transparent 70%);
            top: -15%;
            left: -15%;
            transform: translate(10%, 10%);
        }

        .orb-2 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(135, 206, 235, 0.25), transparent 70%);
            bottom: -20%;
            right: -15%;
            transform: translate(-10%, -10%);
        }

        .orb-3 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2), transparent 70%);
            top: 30%;
            left: 30%;
            transform: translate(-50%, -50%);
        }

        @keyframes orb-pulse {

            0%,
            100% {
                transform: scale(1) translate(10%, 10%);
            }

            50% {
                transform: scale(1.1) translate(10%, 10%);
            }
        }

        /* Particles canvas - decorative background */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.4;
            will-change: opacity;
        }

        /* Transition to Lit Environment */
        body.lit-environment {
            background-color: var(--bg-lit);
        }

        body.lit-environment .glow-orb {
            opacity: 1;
        }

        body.lit-environment #particles-canvas {
            opacity: 0.8;
        }
        /* === GAME VIEWPORT - Zoom-to-Fit Fixed Layout === */
        .game-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #030005;
            z-index: 10;
            overflow: hidden;
        }

        /* Fixed 9:16 Base Canvas */
        #main-container {
            position: absolute;
            width: 360px;
            height: 640px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            z-index: 15;
            overflow: hidden;
            background: linear-gradient(180deg, #0d0c13 0%, #1a1525 50%, #0d0c13 100%);
            will-change: transform;
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            will-change: opacity, display, transform;
        }

        .vignette-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.6) 100%);
        }

        /* === SAFE ZONE MARGINS === */
        .scene-content {
            position: relative;
            width: 100%;
            height: 100%;
            padding: var(--safe-zone);
        }

        /* === GLASSMORPHISM INSTRUCTIONS === */
        .glass-instruction {
            position: absolute;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            overflow: hidden;
            pointer-events: none;
            z-index: 50;
        }

        .glass-instruction span {
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            animation: shimmer-anim 3s infinite;
        }

        @keyframes shimmer-anim {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        /* Instruction positions within viewport */
        .lighter-tip {
            top: 105%; /* Positioned relative to lighter-wrapper */
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .slice-tip {
            top: 110%; /* Positioned relative to knife-wrapper */
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        /* === SCENE 1: CANDLE (Top Area 15-25%) === */
        .candle-wrapper {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translate(-50%, 0);
            width: 15%;
            max-width: 140px;
            height: auto;
            aspect-ratio: 2/5;
        }

        .candle-lux {
            width: 100%;
            height: 100%;
        }

        .ambient-candle-glow {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 200, 50, 0.5) 0%, rgba(255, 100, 0, 0.15) 40%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* === SCENE 1: LIGHTER (Bottom Area) === */
        .lighter-wrapper {
            position: absolute;
            bottom: 8%; /* Slightly higher to allow instruction below */
            left: 50%;
            transform: translateX(-50%);
            width: 10%;
            max-width: 80px;
            height: auto;
            aspect-ratio: 1/2;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
        }

        .lighter-wrapper:hover {
            transform: translateX(-50%) scale(1.05); /* organic hover */
            filter: drop-shadow(0px 4px 12px rgba(255, 200, 50, 0.3));
        }

        .lighter-wrapper::after {
            content: '';
            position: absolute;
            top: -30px;
            left: -30px;
            right: -30px;
            bottom: -30px;
        }

        .lighter-lux {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* === SCENE 2: CAKE (Lower Middle Area) === */
        .cake-wrapper {
            position: absolute;
            top: 65%; /* Shifted downwards */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35%;
            max-width: 200px;
            height: auto;
            aspect-ratio: 2/5;
            z-index: 12;
        }

        .cake-half {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .cake-half>svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .lux-left {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
        }

        .lux-right {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        .cake-stand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 80%);
            width: 180%;
            height: auto;
            aspect-ratio: 7/1;
            z-index: 11;
        }

        /* === SCENE 2: KNIFE (Between Candle and Cake) === */
        .knife-wrapper {
            position: absolute;
            top: 45%; /* Positioned between candle (top) and cake (bottom) */
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg) scale(6.0);
            width: 100%;
            height: auto;
            aspect-ratio: 15/1;
            max-width: 600px;
            opacity: 0;
            z-index: 15;
            cursor: grab;
            touch-action: manipulation;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.4));
            will-change: transform, filter;
        }

        .knife-wrapper:active {
            cursor: grabbing;
        }

        .knife-lux {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* === SCENE 3: MESSAGE (Full Viewport) === */
        #scene-3 {
            z-index: 30;
            pointer-events: none;
        }

        .scene-3-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        .scene-3-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.2), rgba(166, 209, 244, 0.1) 50%, transparent 80%);
            filter: blur(30px);
            opacity: 0.7;
            will-change: filter;
        }

        .scene-3-background::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80%;
            height: 60%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 30% 30%, rgba(255, 241, 235, 0.4), transparent 60%);
            filter: blur(20px);
            opacity: 0.5;
            will-change: transform, filter;
        }

        /* Message Box */
        .message-box {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 35;
            position: relative;
            will-change: transform, opacity;
            width: 320px;
        }

        /* Firebase Data Container */
        .firebase-data-container {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 40;
            opacity: 0;
            width: 90%;
        }

        .receiver-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .photo-container {
            position: relative;
            width: 180px;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .receiver-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: #d1d5db;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 2px dashed rgba(255, 255, 255, 0.3);
        }

        .lux-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-style: italic;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37 0%, #fcf6ba 50%, #b38728 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(252, 246, 186, 0.5);
            margin-bottom: 15px;
            line-height: 1.1;
            transform: translateZ(0);
            will-change: transform;
            animation: titleBreath 4s ease-in-out infinite;
        }

        @keyframes titleBreath {

            0%,
            100% {
                transform: scale(1) translateY(0px);
            }

            50% {
                transform: scale(1.02) translateY(-2px);
            }
        }

        .custom-message {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.5;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .sender-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: #d1d5db;
            font-style: italic;
            margin-bottom: 2rem;
        }

        /* Button */
        .lux-button {
            padding: 10px 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 40px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .lux-button .instagram-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            opacity: 0.9;
        }

        /* Particles & Balloons */
        .spark-container {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #ffaa00, 0 0 10px #ffaa00;
            opacity: 0;
            animation: floatUpSparkle 2s ease-in infinite;
        }
        @keyframes floatUpSparkle {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-30px) scale(0); opacity: 0; }
        }

        .balloon {
            position: absolute;
            bottom: -50px;
            width: 30px;
            height: 40px;
            background: #ffb6c1;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
            animation: floatUpBalloon 8s ease-in forwards;
            z-index: 5;
            opacity: 0.8;
        }
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background: rgba(255,255,255,0.3);
        }
        @keyframes floatUpBalloon {
            0% { transform: translateY(0) rotate(-5deg); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(-50vh) rotate(5deg); }
            100% { transform: translateY(-120vh) rotate(-5deg); opacity: 0; }
        }

        /* Branding Styles */
        .branding-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.7;
        }

        .branding-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .branding-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Static Capture Branding (Safe CSS) */
        .static-branding {
            position: absolute;
            top: 590px;
            left: 0;
            width: 360px;
            text-align: center;
        }

        .static-logo {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
        }

        .static-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #ffffff;
        }

    </style>

    <!-- Meta Tags for Premium Experience -->
    <meta name="theme-color" content="#1a1525">
    <meta name="description" content="An ultra-premium interactive birthday celebration experience">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">

    <!-- Preload Critical Assets -->
    <link rel="preload" href="https://assets.mixkit.co/active_storage/sfx/228/228-preview.mp3" as="audio">
    <link rel="preload" href="https://assets.mixkit.co/active_storage/sfx/2049/2049-preview.mp3" as="audio">

    <!-- Firebase SDK (Compat) - MOVED TO BOTTOM FOR PERFORMANCE -->

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>

<body>

    <!-- === DECORATIVE BACKGROUND LAYER === -->
    <div class="decorative-bg-layer">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
        <canvas id="particles-canvas"></canvas>
    </div>

    <!-- === GAME VIEWPORT CONTAINER === -->
    <div class="game-viewport">


            <!-- Main Content Container -->
            <div id="main-container">
                <!-- Scene 1: Candle & Cinematic Lighter -->
                <div id="scene-1" class="scene">
                    <div class="candle-wrapper">
                        <!-- Luxurious Candle SVG -->
                        <svg class="candle-lux" viewBox="0 0 120 300" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <!-- Candle Body Gradient -->
                                <linearGradient id="luxCandleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#fff5f5" />
                                    <stop offset="20%" stop-color="#ffebeb" />
                                    <stop offset="50%" stop-color="#fff" />
                                    <stop offset="80%" stop-color="#ffebeb" />
                                    <stop offset="100%" stop-color="#f5e1e1" />
                                </linearGradient>
                                <linearGradient id="luxFlameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#ffffff" />
                                    <stop offset="20%" stop-color="#ffea00" />
                                    <stop offset="60%" stop-color="#ff7b00" />
                                    <stop offset="100%" stop-color="#ff0000" />
                                </linearGradient>
                                <filter id="ultraGlow" x="-50%" y="-50%" width="200%" height="200%">
                                    <feGaussianBlur stdDeviation="15" result="blur1" />
                                    <feGaussianBlur stdDeviation="30" result="blur2" />
                                    <feMerge>
                                        <feMergeNode in="blur2" />
                                        <feMergeNode in="blur1" />
                                        <feMergeNode in="SourceGraphic" />
                                    </feMerge>
                                </filter>
                            </defs>
                            <!-- Floating Base/Plate -->
                            <ellipse cx="60" cy="270" rx="45" ry="12" fill="rgba(255,255,255,0.1)" />
                            <ellipse cx="60" cy="268" rx="40" ry="10" fill="#d4af37" /> <!-- Gold plate -->
                            <!-- Body -->
                            <rect x="40" y="100" width="40" height="165" rx="8" fill="url(#luxCandleGrad)"
                                filter="drop-shadow(0 10px 10px rgba(0,0,0,0.2))" />
                            <!-- Wax Drips -->
                            <path d="M42 100 Q 45 130 48 135 Q 51 130 54 100 Z" fill="#fff" />
                            <path d="M78 100 Q 75 140 72 145 Q 69 140 66 100 Z" fill="#fff" />
                            <!-- Wick -->
                            <path d="M60 100 Q 62 90 58 80" stroke="#222" stroke-width="3" fill="none"
                                stroke-linecap="round" />
                            <!-- Flame -->
                            <path id="candle-flame" d="M58 20 C 70 50 65 75 58 80 C 51 75 46 50 58 20 Z"
                                fill="url(#luxFlameGrad)" filter="url(#ultraGlow)" opacity="0" class="fire" />
                        </svg>
                        <div class="ambient-candle-glow"></div>
                    </div>

                    <div class="lighter-wrapper">
                        <!-- Cinematic Lighter SVG -->
                        <svg class="lighter-lux" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#4a4a4a" />
                                    <stop offset="20%" stop-color="#8c8c8c" />
                                    <stop offset="50%" stop-color="#d9d9d9" />
                                    <stop offset="80%" stop-color="#8c8c8c" />
                                    <stop offset="100%" stop-color="#3d3d3d" />
                                </linearGradient>
                                <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#bf953f" />
                                    <stop offset="50%" stop-color="#fcf6ba" />
                                    <stop offset="100%" stop-color="#b38728" />
                                </linearGradient>
                            </defs>

                            <!-- Lighter Body -->

            <script>
                // Encapsulate scope to prevent collision with app.js (e.g. 'db' redeclaration)
                (() => {
                // --- GLOBAL SCALING LOGIC ---
                function updateLayoutScale() {
                    const widthLimit = window.innerWidth / 360;
                    const heightLimit = window.innerHeight / 640;
                    const scale = Math.min(widthLimit, heightLimit);
                    const mainContainer = document.getElementById('main-container');

                window.addEventListener('resize', updateLayoutScale);
                window.addEventListener('load', updateLayoutScale);
                updateLayoutScale();

                // Register GSAP Plugins with Error Handling
                try {
                    gsap.registerPlugin(Draggable);
                } catch (e) {
                    console.error("GSAP Plugin Registration Failed:", e);
                }

                // DOM Elements
                const mainContainer = document.getElementById('main-container');
                const candleWrapper = document.querySelector('.candle-wrapper');
                const candleFlame = document.getElementById('candle-flame');
                const ambientCandleGlow = document.querySelector('.ambient-candle-glow');
                const lighterWrapper = document.querySelector('.lighter-wrapper');
                const lighterFlame = document.getElementById('lighter-flame');
                const lighterLid = document.getElementById('lighter-lid');
                const lighterTip = document.querySelector('.lighter-tip');
                const scene1 = document.getElementById('scene-1');
                const scene2 = document.getElementById('scene-2');
                const scene3 = document.getElementById('scene-3');
                const sliceTip = document.querySelector('.slice-tip');
                const knifeWrapper = document.querySelector('.knife-wrapper');
                const cakeLeft = document.querySelector('.lux-left');
                const cakeRight = document.querySelector('.lux-right');

                // Audio Elements
                const sfxLighterOpen = document.getElementById('sfx-lighter-open');
                const sfxLighterSpark = document.getElementById('sfx-lighter-spark');
                const sfxFlame = document.getElementById('sfx-flame');
                const sfxSlice = document.getElementById('sfx-slice');
                const sfxPop = document.getElementById('sfx-pop');
                const sfxCakeBuild = document.getElementById('sfx-cake-build');
                const sfxSurprise = document.getElementById('sfx-surprise');
                const replayBtn = document.getElementById('replay-btn');

                // Firebase Config (Local Fallback)
                const firebaseConfig = {
                    apiKey: "AIzaSyDDnD8UUvRJnjwU9-Ee2-5uh0ybG7pkutE",
                    authDomain: "giftonscreen.firebaseapp.com",
                    projectId: "giftonscreen",
                    storageBucket: "giftonscreen.firebasestorage.app",
                    messagingSenderId: "984262120605",
                    appId: "1:984262120605:web:df7aa8c601c2f7f10bf074",
                    measurementId: "G-6QKJGDW5Z6"
                };

                // Initialize Firebase
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                const db = firebase.firestore();

                // State
                let isCandleLit = false;

                // --- IMMEDIATE DATA FETCH ---
                (function initData() {
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.has('id')) {
                        console.log("ID detected, initiating early fetch...");
                        displayFirebaseData();
                    }
                })();

                // Helpers: Play Audio (Fail-safe for browser autoplay policies)
                function playAudio(element, volume = 1) {
                    if (!element) {
                        console.warn('Audio element not found');
                        return;
                    }
                    element.volume = volume;
                    try {
                        let playPromise = element.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(error => { console.log('Audio playback prevented'); });
                        }
                    } catch (e) { }
                }

                function stopAudio(element) {
                    if (!element) return;
                    element.pause();
                    element.currentTime = 0;
                }

                // Particle System - Ambient Background
                const canvas = document.getElementById('particles-canvas');
                const ctx = canvas.getContext('2d');
                let width, height, particles = [];

                function resizeCanvas() {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                class Particle {
                    constructor() {
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                        this.size = Math.random() * 2 + 0.5;
                        this.speedY = Math.random() * -0.5 - 0.1; /* Float up */
                        this.speedX = (Math.random() - 0.5) * 0.5;
                        this.opacity = Math.random() * 0.5 + 0.1;
                    }
                    update() {
                        this.y += this.speedY;
                        this.x += this.speedX;
                        if (this.y < 0) {
                            this.y = height;
                            this.x = Math.random() * width;
                        }
                    }
                    draw() {
                        ctx.fillStyle = `rgba(255, 235, 180, ${this.opacity})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                function initParticles() {
                    for (let i = 0; i < 100; i++) particles.push(new Particle());
                }
                function animateParticles() {
                    ctx.clearRect(0, 0, width, height);
                    particles.forEach(p => { p.update(); p.draw(); });
                    requestAnimationFrame(animateParticles);
                }
                initParticles();
                animateParticles();

                // --- INIT TIMELINE ---
                const initTl = gsap.timeline();
                initTl.to(lighterWrapper, {
                    y: -180, /* Move into frame - adjusted for new layout */
                    duration: 2,
                    ease: "power3.out",
                    delay: 0.5
                });

                // --- SCENE 1: LIGHTER INTERACTION ---
                lighterWrapper.addEventListener('click', () => {
                    if (isCandleLit) return;
                    isCandleLit = true;

                    // Hide tip
                    gsap.to(lighterTip, { opacity: 0, duration: 0.5 });

                    const tl = gsap.timeline();

                    // 1. Mechanical Lid Open
                    tl.call(() => playAudio(sfxLighterOpen))
                        .to(lighterLid, { rotation: -110, transformOrigin: "-50px -45px", duration: 0.3, ease: "power2.inOut" })
                        .to(lighterWrapper, { y: "-=10", duration: 0.1, yoyo: true, repeat: 1 }, "<"); // slight recoil

                    // 2. Strike & Ignite Lighter
                    tl.call(() => playAudio(sfxLighterSpark), null, "+=0.2")
                        .to(lighterFlame, { opacity: 1, duration: 0.1, ease: "rough" })
                        .to(lighterFlame, { scaleY: 1.2, scaleX: 1.1, transformOrigin: "bottom center", yoyo: true, repeat: 5, duration: 0.05 }, "<");

                    // 3. Smooth Move towards Candle (Organic Arc)
                    tl.to(lighterWrapper, {
                        x: -40,  /* Move left */
                        duration: 1.5,
                        ease: "sine.inOut"
                    }, "moveArc")
                    .to(lighterWrapper, {
                        y: "-=220", /* Move up to wick */
                        duration: 1.5,
                        ease: "power2.out"
                    }, "moveArc");

                    // 4. Ignite Candle
                    tl.to(candleFlame, { opacity: 1, duration: 0.5 }, "-=0.2")
                        .to(ambientCandleGlow, { opacity: 1, duration: 1.5 }, "<")
                        .call(() => {
                            document.body.classList.add('lit-environment');
                            // playAudio(sfxFlame, 0.2); // Removed ambient breathing/fire sound per request
                            // stopAudio(sfxFlame);

                            // Spawn Smoke/Sparkles
                            spawnSparkles();

                            // Candle flicker loop
                            gsap.to(candleFlame, {
                                scaleY: 1.05, scaleX: 1.02, rotation: () => Math.random() * 2 - 1,
                                transformOrigin: "bottom center", duration: 0.1,
                                yoyo: true, repeat: -1, ease: "none"
                            });
                            gsap.to(ambientCandleGlow, {
                                scale: 1.05, opacity: 0.8, yoyo: true, repeat: -1, duration: 0.8, ease: "sine.inOut"
                            });
                        });

                    // 5. Lighter Exit
                    tl.to(lighterFlame, { opacity: 0, duration: 0.2 }, "+=0.5")
                        .to(lighterLid, { rotation: 0, duration: 0.3 }, "<")
                        .to(lighterWrapper, { y: "+=600", opacity: 0, duration: 1.5, ease: "power3.in" });

                    // 6. Camera Zoom Out & Cake Reveal (Cinematic)
                    tl.to(ambientCandleGlow, { scale: 1.5, opacity: 1, duration: 0.5, yoyo: true, repeat: 1, ease: "power1.inOut" }, "+=0.2") // Light pulse
                        .to(mainContainer, { scale: 0.85, y: -40, duration: 2.5, ease: "power3.inOut" }, "<")
                        .to(candleWrapper, { top: '30%', scale: 0.5, duration: 2.5, ease: "power3.inOut" }, "<") /* move candle further up for cake build */
                        .to(scene1, { pointerEvents: "none" }, "<")
                        .to(scene2, { display: "flex", opacity: 0 }, "-=1")
                        .call(() => playAudio(sfxCakeBuild, 0.7), null, "<")
                        .to(scene2, { opacity: 1, duration: 2, ease: "sine.inOut" }, "<") // gradual fade in
                        .call(() => {
                            const leftAnim = document.getElementById('bizcocho_1_left_s2');
                            const rightAnim = document.getElementById('bizcocho_1_right_s2');
                            if (leftAnim) leftAnim.beginElement();
                            if (rightAnim) rightAnim.beginElement();
                        }, null, "-=0.5")
                        .to(knifeWrapper, { opacity: 1, y: 0, duration: 1.5, ease: "power3.out" }, "+=6") /* knife appears earlier but still after major build */
                        .call(initKnifeDrag);
                });

                // --- SCENE 2: KNIFE DRAGGING ---
                function initKnifeDrag() {
                    gsap.to(sliceTip, { opacity: 1, duration: 1, delay: 0.5 }); // Explicitly show tip
                    gsap.to(knifeWrapper, { y: 1.5, yoyo: true, repeat: -1, duration: 1.5, ease: "sine.inOut" });

                    // Calculate cake bounds for precise center slicing
                    const isMobile = window.innerWidth <= 768;
                    const bounds = {
                        top: -100,
                        bottom: 150,
                        left: 0,
                        right: 0
                    };

                    Draggable.create(knifeWrapper, {
                        type: "y",
                        bounds: bounds,
                        trigger: knifeWrapper,
                        onPress: function () {
                            gsap.killTweensOf(knifeWrapper); // stop bounce
                            gsap.to(knifeWrapper, { scale: 6.2, duration: 0.2 }); // Tactile feedback
                            gsap.to(sliceTip, { opacity: 0, duration: 0.3 });
                            playAudio(sfxSlice, 0.5); // subtle start sound
                        },
                        onDrag: function () {
                            // Dynamic shadow based on drag distance
                            const progress = Math.min(Math.max(this.y / 100, 0), 1);
                            gsap.set(knifeWrapper, { filter: `drop-shadow(0 ${15 + progress * 20}px ${15 + progress * 10}px rgba(0,0,0,${0.4 + progress * 0.4}))` });
                        },
                        onDragEnd: function () {
                            gsap.to(knifeWrapper, { scale: 6.0, duration: 0.2 });
                            if (this.y > 30) {
                                this.disable();

                                // Hide knife
                                gsap.to(knifeWrapper, { y: "+=150", opacity: 0, duration: 0.6, ease: "power2.in" });

                                // Split Cake
                                const splitTl = gsap.timeline();

                                // Pre-split vibration
                                splitTl.to(".cake-wrapper", { x: 3, yoyo: true, repeat: 5, duration: 0.04, ease: "sine.inOut" })
                                    .to(candleFlame, { opacity: 0, scale: 0, duration: 0.2 }, "+=0.1")
                                    .to(ambientCandleGlow, { opacity: 0, duration: 0.5 }, "<")
                                    .call(() => stopAudio(sfxFlame))
                                    .to(candleWrapper, { opacity: 0, y: "-=30", duration: 0.5 }, "<");

                                // Halves separate cleanly with spring back
                                splitTl.to(cakeLeft, { x: -80, rotation: -3, duration: 1.2, ease: "back.out(1.4)" }, "<")
                                    .to(cakeRight, { x: 80, rotation: 3, duration: 1.2, ease: "back.out(1.4)" }, "<")
                                    .to('.cake-stand', { scaleX: 1.1, opacity: 0.5, duration: 1 }, "<");

                                // Enter Celebration
                                splitTl.call(firePremiumCelebration, null, "-=0.8");

                                // Hide Scene 2 (Cake)
                                splitTl.to(scene2, { opacity: 0, duration: 1, ease: "power2.inOut" }, "-=0.5")
                                    .set(scene2, { display: "none" });

                                // Show Message
                                splitTl.to(scene3, { display: "flex", opacity: 1, pointerEvents: "auto", duration: 1.5 }, "+=0.2")
                                    .call(() => playAudio(sfxSurprise, 0.8), null, "<")
                                    .fromTo('.message-box', { y: 40, opacity: 0, scale: 0.9, filter: "blur(10px)" }, { y: 0, opacity: 1, scale: 1, filter: "blur(0px)", duration: 1.8, ease: "power3.out" }, "-=1")
                                    .call(displayFirebaseData, null, "-=1");
                            } else {
                                // Snap back smoothly
                                gsap.to(knifeWrapper, { y: 0, duration: 0.6, ease: "back.out(1.7)" });
                                gsap.to(knifeWrapper, { filter: "drop-shadow(0 0 15px rgba(0,0,0,0.4))", duration: 0.6 });
                                gsap.to(knifeWrapper, { y: 5, yoyo: true, repeat: -1, duration: 1.5, ease: "sine.inOut", delay: 0.6 });
                                gsap.to(sliceTip, { opacity: 1, duration: 0.3 });
                            }
                        }
                    });
                }

                // --- SCENE 4: ADVANCED CONFETTI & BALLOONS ---
                function spawnBalloons() {
                    const colors = ['#d4af37', '#ffb6c1', '#add8e6'];
                    for (let i = 0; i < 6; i++) {
                        const balloon = document.createElement('div');
                        balloon.className = 'balloon';
                        balloon.style.background = colors[i % colors.length];
                        balloon.style.left = Math.random() * 80 + 10 + '%';
                        balloon.style.animationDelay = Math.random() * 1.5 + 's';
                        document.getElementById('scene-3').appendChild(balloon);
                    }
                }

                function spawnSparkles() {
                    const sparkContainer = document.createElement('div');
                    sparkContainer.className = 'spark-container';
                    document.querySelector('.candle-wrapper').appendChild(sparkContainer);
                    for (let i = 0; i < 10; i++) {
                        const spark = document.createElement('div');
                        spark.className = 'sparkle';
                        spark.style.left = (Math.random() * 40 - 20) + 'px';
                        spark.style.animationDelay = Math.random() * 2 + 's';
                        sparkContainer.appendChild(spark);
                    }
                }

                function firePremiumCelebration() {
                    playAudio(sfxPop);
                    spawnBalloons();

                    const duration = 5000;
                    const end = Date.now() + duration;

                    // Golden & Pastel theme confetti
                    const colors = ['#d4af37', '#fcf6ba', '#ffb6c1', '#add8e6', '#ffffff'];

                    (function frame() {
                        confetti({
                            particleCount: 5,
                            angle: 60,
                            spread: 80,
                            origin: { x: 0, y: 0.9 },
                            colors: colors,
                            zIndex: 100
                        });
                        confetti({
                            particleCount: 5,
                            angle: 120,
                            spread: 80,
                            origin: { x: 1, y: 0.9 },
                            colors: colors,
                            zIndex: 100
                        });

                        // Add some random bursts in the middle
                        if (Math.random() > 0.8) {
                            confetti({
                                particleCount: 15,
                                spread: 100,
                                origin: { x: 0.5, y: 0.5 },
                                colors: colors,
                                zIndex: 100
                            });
                        }

                        if (Date.now() < end) {
                            requestAnimationFrame(frame);
                        }
                    }());
                }

                // --- STATIC DATA HANDLING ---
                function fetchStaticData() {
                    // Priority 1: Injected by app.js (Standard across templates)
                    if (window.GOS_DATA) {
                        return {
                            receiverName: window.GOS_DATA.receiver || 'Friend',
                            photoUrl: window.GOS_DATA.photoUrl || null,
                            message: window.GOS_DATA.message || 'Wishing you a wonderful birthday!',
                            senderName: window.GOS_DATA.sender || 'Your Friend'
                        };
                    }

                    // Fallback for standalone viewing / URL params
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.has('name') || urlParams.has('msg')) {
                        return {
                            receiverName: urlParams.get('name') || 'Friend',
                            photoUrl: urlParams.get('photo') || null,
                            message: urlParams.get('msg') || 'Wishing you a wonderful birthday!',
                            senderName: urlParams.get('from') || 'Your Friend'
                        };
                    }

                    // Default fallback
                    return {
                        receiverName: 'Friend',
                        photoUrl: null,
                        message: 'Wishing you a wonderful birthday!',
                        senderName: 'Your Friend'
                    };
                }

                async function displayFirebaseData() {
                    console.log("displayFirebaseData triggered");
                    
                    // Helper to perform the actual DOM updates
                    const updateUI = (data) => {
                        console.log("Updating UI with data:", data);
                        const receiverNameElement = document.getElementById('receiver-name');
                        if (receiverNameElement) {
                            receiverNameElement.textContent = `Happy Birthday ${data.receiverName}!`;
                        }

                        const messageElement = document.getElementById('custom-message');
                        if (messageElement) {
                            messageElement.textContent = data.message;
                        }

                        const senderNameElement = document.getElementById('sender-name');
                        if (senderNameElement) {
                            senderNameElement.textContent = `— ${data.senderName}`;
                        }

                        const photoElement = document.getElementById('receiver-photo');
                        const photoPlaceholder = document.getElementById('photo-placeholder');

                        if (data.photoUrl && photoElement && photoPlaceholder) {
                            photoElement.src = data.photoUrl;
                            photoElement.style.display = 'block';
                            photoPlaceholder.style.display = 'none';
                        }
                    };

                    // 1. Immediate Update with static/local data (Priority: GOS_DATA -> URL Params)
                    let data = fetchStaticData();
                    updateUI(data);

                    // 2. Async Firebase Fetch (if ID present)
                    const urlParams = new URLSearchParams(window.location.search);
                    const giftId = urlParams.get('id');

                    if (giftId) {
                        console.log("Attempting fresh fetch for giftId:", giftId);
                        try {
                            let giftDoc = null;
                            // Query by custom 'id' field
                            let snapshot = await db.collection("gifts").where("id", "==", giftId).get();
                            if (!snapshot.empty) {
                                giftDoc = snapshot.docs[0].data();
                            } else {
                                // Fallback to direct document ID
                                const docRef = await db.collection("gifts").doc(giftId).get();
                                if (docRef.exists) giftDoc = docRef.data();
                            }

                            if (giftDoc) {
                                console.log("New data fetched from Firebase:", giftDoc);
                                const newData = {
                                    receiver: giftDoc.receiver || giftDoc.receiverName || 'Friend',
                                    photoUrl: giftDoc.photoUrl || giftDoc.photoURL || null,
                                    message: giftDoc.message || 'Wishing you a wonderful birthday!',
                                    sender: giftDoc.sender || giftDoc.senderName || 'Your Friend'
                                };
                                // Normalize for window.GOS_DATA to match app.js
                                window.GOS_DATA = newData;
                                
                                // Map to the structure expected by updateUI
                                updateUI({
                                    receiverName: newData.receiver,
                                    photoUrl: newData.photoUrl,
                                    message: newData.message,
                                    senderName: newData.sender
                                });
                            }
                        } catch (e) {
                            console.error("Firebase fetch error in template:", e);
                        }
                    }
                }
                // --- IMAGE CAPTURE & SHARING ---
                async function captureScene() {
                    const staticScene = document.getElementById('scene-3-static');
                    const data = fetchStaticData();
                    
                    // Sync data to static scene
                    const titleEl = document.getElementById('static-receiver-name');
                    const msgEl = document.getElementById('static-message');
                    const senderEl = document.getElementById('static-sender');
                    
                    if (titleEl) titleEl.textContent = `Happy Birthday ${data.receiverName}!`;
                    if (msgEl) msgEl.textContent = data.message;
                    if (senderEl) senderEl.textContent = `— ${data.senderName}`;
                    
                    const staticPhoto = document.getElementById('static-photo');
                    const staticPlaceholder = document.getElementById('static-placeholder');
                    if (data.photoUrl && staticPhoto) {
                        staticPhoto.src = data.photoUrl;
                        staticPhoto.style.display = 'block';
                        if (staticPlaceholder) staticPlaceholder.style.display = 'none';
                        // Wait for image to load
                        await new Promise(r => {
                            if (staticPhoto.complete) r();
                            else staticPhoto.onload = r;
                        });
                    } else if (staticPhoto) {
                        staticPhoto.style.display = 'none';
                        if (staticPlaceholder) staticPlaceholder.style.display = 'flex';
                    }

                    try {
                        // Ensure images are fully loaded and CORS is respected
                        const canvas = await html2canvas(staticScene, {
                            useCORS: true,
                            allowTaint: false,
                            backgroundColor: '#0d0c13',
                            scale: 3, // Premium quality
                            logging: false,
                            width: 360,
                            height: 640
                        });
                        return canvas;
                    } catch (err) {
                        console.error("Capture failed:", err);
                        return null;
                    }
                }

                // Save to Gallery
                const saveBtn = document.getElementById('save-image-btn');
                if (saveBtn) {
                  saveBtn.addEventListener('click', async function() {
                      const btn = this;
                      const originalText = btn.innerHTML;
                      btn.innerHTML = '<i class="ph ph-circle-notch animate-spin mr-2"></i> Capturing...';
                      btn.disabled = true;

                      const canvas = await captureScene();
                      if (canvas) {
                          const link = document.createElement('a');
                          link.download = `Birthday-Surprise-${Date.now()}.png`;
                          link.href = canvas.toDataURL('image/png');
                          link.click();
                          
                          btn.innerHTML = '<i class="ph ph-check mr-2"></i> Saved!';
                          const instaBtn = document.getElementById('instagram-story-btn');
                          if (instaBtn) instaBtn.style.display = 'flex';
                      } else {
                          btn.innerHTML = '<i class="ph ph-warning mr-2"></i> Error';
                      }
                      
                      setTimeout(() => {
                          btn.innerHTML = originalText;
                          btn.disabled = false;
                      }, 3000);
                  });
                }

                // Instagram Story Share
                const instaBtn = document.getElementById('instagram-story-btn');
                if (instaBtn) {
                  instaBtn.addEventListener('click', async function() {
                      const canvas = await captureScene();
                      if (!canvas) return;

                      canvas.toBlob(async (blob) => {
                          const file = new File([blob], "birthday-surprise.png", { type: "image/png" });
                          
                          if (navigator.canShare && navigator.canShare({ files: [file] })) {
                              try {
                                  await navigator.share({
                                      files: [file],
                                      title: 'Birthday Surprise',
                                      text: 'Check out this special surprise!'
                                  });
                              } catch (err) {
                                  console.log("Sharing failed", err);
                              }
                          } else {
                              // Fallback for browsers that don't support file sharing
                              alert("Sharing not supported on this browser. Please save the image and upload manually to Instagram.");
                          }
                      }, 'image/png');
                  });
                }

                                // Share Functionality
                                const shareBtn = document.getElementById('share-btn');
                                if (shareBtn) {
                                    shareBtn.addEventListener('click', async () => {
                                        const shareData = {
                                            title: 'Gifts On Screen ✨',
                                            text: `Check out this special birthday surprise for ${document.getElementById('receiver-name').textContent.replace('Happy Birthday ', '').replace('!', '')}!`,
                                            url: window.location.href
                                        };

                                        try {
                                            if (navigator.share) {
                                                await navigator.share(shareData);
                                            } else {
                                                // Fallback: Copy to clipboard
                                                await navigator.clipboard.writeText(window.location.href);
                                                const originalSpan = shareBtn.querySelector('span');
                                                const originalText = originalSpan.textContent;
                                                originalSpan.textContent = 'Link Copied!';
                                                setTimeout(() => {
                                                    originalSpan.textContent = originalText;
                                                }, 2000);
                                            }
                                        } catch (err) {
                                            console.error('Share failed:', err);
                                        }
                                    });
                                }

                // Expose globally for app.js to call during injection
                window.displayFirebaseData = displayFirebaseData;
                
                })(); // End encapsulated scope
            </script>
</body>
