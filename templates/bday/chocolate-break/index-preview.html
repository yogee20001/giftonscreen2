<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chocolate Birthday Surprise | GiftOnScreen ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Animation Pause Class */
        .animations-paused * {
            animation-play-state: paused !important;
            transition: none !important;
        }

        :root {
            --lux-gold: #D4AF37;
            --lux-gold-glow: rgba(212, 175, 55, 0.4);
            --cocoa-dark: #1A0F0A;
            --cocoa-medium: #2C1B12;
            --cocoa-light: #4A3728;
            --cream-silk: #F8F4E3;
            --glass-bg: rgba(26, 15, 10, 0.7);
            --glass-border: rgba(212, 175, 55, 0.2);

            /* Z-Layer System */
            --z-bg: 1;
            --z-ambient: 5;
            --z-content: 10;
            --z-particles: 50;
            --z-overlay: 100;
            --z-message: 55;
            --z-photo: 56;
            --z-celebration: 60;
        }

        body {
            background: #0A0705;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--cream-silk);
        }

        /* Mobile-first 9:16 container with luxury frame */
        .gift-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 850px;
            aspect-ratio: 9/16;
            overflow: hidden;
            background: var(--cocoa-dark);
            box-shadow: 0 0 100px rgba(0, 0, 0, 1),
                inset 0 0 20px rgba(212, 175, 55, 0.1);
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }

        /* Cinematic Background */
        .cinematic-bg {
            position: absolute;
            inset: -10%;
            width: 120%;
            height: 120%;
            background: url('bg.png') center/cover no-repeat;
            filter: brightness(0.6) contrast(1.1);
            animation: slowPan 20s linear infinite alternate;
            z-index: var(--z-bg);
        }

        @keyframes slowPan {
            0% {
                transform: scale(1) translate(-2%, -2%);
            }

            100% {
                transform: scale(1.1) translate(2%, 2%);
            }
        }

        .gradient-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(10, 7, 5, 0.8) 100%);
            z-index: 2;
        }

        /* Scene 1: Chocolate Intro */
        .intro-scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: var(--z-content);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .intro-scene.hidden {
            opacity: 0;
            transform: scale(1.1) translateY(-20px);
            filter: blur(10px);
            visibility: hidden;
        }

        .instruction-text {
            position: absolute;
            top: 12%;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-style: italic;
            font-size: clamp(18px, 5vw, 24px);
            color: var(--lux-gold);
            text-align: center;
            padding: 0 10%;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--lux-gold-glow);
            animation: elegantFade 3s ease-in-out infinite;
        }

        @keyframes elegantFade {

            0%,
            100% {
                opacity: 0.6;
                transform: translateY(0);
            }

            50% {
                opacity: 1;
                transform: translateY(-5px);
            }
        }

        /* Premium Chocolate Bar */
        .chocolate-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            max-width: 320px;
            aspect-ratio: 0.8;
            z-index: var(--z-content);
            cursor: pointer;
            perspective: 1000px;
        }

        .chocolate-bar {
            width: 100%;
            height: 100%;
            background: url('texture.png') center/cover no-repeat, var(--cocoa-medium);
            border-radius: 8px;
            position: relative;
            transform-style: preserve-3d;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.8),
                inset 0 0 40px rgba(0, 0, 0, 0.5),
                0 0 0 2px var(--cocoa-dark);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .chocolate-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%, rgba(0, 0, 0, 0.2) 100%);
            border-radius: 8px;
            pointer-events: none;
        }

        .chocolate-container:hover .chocolate-bar {
            transform: scale(1.05) rotateX(5deg) rotateY(2deg);
        }

        .chocolate-shine {
            position: absolute;
            top: 0;
            left: -150%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.15) 45%,
                    rgba(255, 255, 255, 0.3) 50%,
                    rgba(255, 255, 255, 0.15) 55%,
                    transparent 100%);
            transform: skewX(-25deg);
            animation: shineSweep 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            pointer-events: none;
        }

        @keyframes shineSweep {
            0% {
                left: -150%;
            }

            20% {
                left: 150%;
            }

            100% {
                left: 150%;
            }
        }

        /* Scene 2: Premium Grid */
        .grid-scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: var(--z-content);
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease;
            background: radial-gradient(circle at center, rgba(44, 27, 18, 0.4) 0%, transparent 70%);
        }

        .grid-scene.active {
            opacity: 1;
            visibility: visible;
        }

        .chocolate-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 85%;
            max-width: 320px;
            padding: 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }

        .chocolate-square {
            aspect-ratio: 1;
            background: url('texture.png') center/cover no-repeat, var(--cocoa-medium);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.4),
                inset 0 0 15px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .chocolate-square::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .chocolate-square:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .chocolate-square.tapped {
            animation: tapBounce 0.15s ease;
        }

        @keyframes tapBounce {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(0.92);
            }

            100% {
                transform: scale(1);
            }
        }

        .chocolate-square.cracked {
            opacity: 0.3;
            transform: scale(0.95);
        }

        /* Realistic Crack & Surprise */
        .crack-line {
            position: absolute;
            background: #000;
            height: 1px;
            filter: blur(0.5px);
            opacity: 0.8;
        }

        .surprise-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 32px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
        }

        .chocolate-square.cracked {
            filter: brightness(0.5) grayscale(0.3);
            transform: scale(0.9) !important;
            pointer-events: none;
        }

        .chocolate-square.cracked .surprise-item {
            transform: translate(-50%, -50%) scale(1.2);
            opacity: 1;
        }

        /* Surprise inside */
        .surprise-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(24px, 8vw, 32px);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .chocolate-square.cracked .surprise-item {
            opacity: 1;
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
            }

            60% {
                transform: translate(-50%, -50%) scale(1.2);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Chocolate crumbs */
        .crumb {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--cocoa-medium);
            border-radius: 50%;
            pointer-events: none;
            z-index: var(--z-content);
        }

        /* Luxury Golden Nugget */
        .golden-candy {
            position: absolute;
            font-size: 48px;
            filter: drop-shadow(0 0 20px var(--lux-gold));
            animation: goldenGlow 2s ease-in-out infinite;
            cursor: pointer;
            z-index: 1000;
        }

        @keyframes goldenGlow {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 15px var(--lux-gold));
            }

            50% {
                transform: scale(1.1) rotate(5deg);
                filter: drop-shadow(0 0 30px var(--lux-gold)) drop-shadow(0 0 50px var(--lux-gold-glow));
            }
        }

        .golden-candy.tapped {
            animation: goldenExplosion 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes goldenExplosion {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            40% {
                transform: scale(1.4);
                opacity: 1;
                filter: brightness(2);
            }

            100% {
                transform: scale(2);
                opacity: 0;
                filter: blur(10px);
            }
        }

        /* Gold Sparkle Burst */
        .sparkle-burst {
            position: absolute;
            pointer-events: none;
            z-index: var(--z-overlay);
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, white 0%, var(--lux-gold) 100%);
            border-radius: 50%;
            filter: blur(1px) drop-shadow(0 0 10px var(--lux-gold));
            animation: sparkleFly 1s cubic-bezier(0.1, 0, 0.3, 1) forwards;
        }

        @keyframes sparkleFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Scene 4: Chocolate Melt */
        .melt-scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: var(--z-content);
            opacity: 0;
            visibility: hidden;
        }

        .melt-scene.active {
            opacity: 1;
            visibility: visible;
        }

        .melt-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--cocoa-medium);
            border-radius: 50%;
            pointer-events: none;
            z-index: var(--z-content);
        }

        /* Scene 5: Luxury Celebration */
        .celebration-scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: var(--z-overlay);
            opacity: 0;
            visibility: hidden;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(20, 10, 5, 0.6) 0%, #0A0705 100%);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .celebration-scene.active {
            opacity: 1;
            visibility: visible;
        }

        .birthday-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            text-align: center;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            transform: translateY(20px);
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .celebration-scene.active .birthday-card {
            transform: translateY(0);
        }

        .birthday-message {
            margin-bottom: 30px;
        }

        .birthday-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 10vw, 42px);
            font-weight: 700;
            color: var(--lux-gold);
            line-height: 1.2;
            text-shadow: 0 0 20px var(--lux-gold-glow);
            animation: textReveal 1.5s ease-out forwards;
        }

        .birthday-subtext {
            font-family: 'Inter', sans-serif;
            font-size: clamp(14px, 4vw, 17px);
            color: var(--cream-silk);
            opacity: 0.9;
            margin: 15px auto 25px;
            line-height: 1.7;
            font-style: italic;
            max-width: 90%;
            animation: textReveal 1.8s ease-out forwards;
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sender-message {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 300;
            color: var(--cream-silk);
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .sender-name-highlight {
            color: var(--lux-gold);
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            font-style: italic;
            display: block;
            margin-top: 5px;
        }

        /* Luxury CTA Button */
        .cta-button {
            width: 100%;
            margin-top: 20px;
            padding: 16px 28px;
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--cocoa-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow:
                0 15px 30px rgba(212, 175, 55, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.5);
        }

        .cta-button:active {
            transform: translateY(1px);
        }

        /* Capture Button Group */
        .capture-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            color: var(--cream-silk);
        }

        /* Loading Overlay for Capture */
        #captureLoading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(15px);
            color: var(--lux-gold);
            font-family: 'Cormorant Garamond', serif;
            text-align: center;
        }

        .capture-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top: 3px solid var(--lux-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Capture Mode Overrides */
        .gift-container.capture-mode {
            max-width: none !important;
            max-height: none !important;
            width: 1080px !important;
            height: 1920px !important;
            border-radius: 0 !important;
            transform: none !important;
        }

        .capture-mode .celebration-scene {
            padding: 80px 60px !important;
        }

        .capture-mode .birthday-card {
            width: 900px !important;
            max-width: none !important;
            padding: 100px 60px !important;
            border-radius: 60px !important;
        }

        .capture-mode .birthday-text {
            font-size: 100px !important;
        }

        .capture-mode .birthday-subtext {
            font-size: 40px !important;
            max-width: 80% !important;
            margin-bottom: 50px !important;
        }

        .capture-mode .sender-name-highlight {
            font-size: 50px !important;
        }

        .capture-mode .sender-message {
            font-size: 30px !important;
        }

        .capture-mode .cta-button,
        .capture-mode .capture-controls {
            display: none !important;
        }

        .capture-mode .candy-photo-frame {
            width: 350px !important;
        }

        .capture-mode .photo-reveal-container {
            margin-bottom: 60px !important;
        }

        /* Static Capture Card (Hidden from view) */
        #staticCaptureContainer {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 1080px;
            height: 1920px;
            background: #0A0705;
            z-index: -100;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .static-card {
            width: 1080px;
            height: 1920px;
            background: url('bg.png') center/cover no-repeat, #0A0705;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            text-align: center;
        }

        .static-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(10, 7, 5, 0.6) 100%);
        }

        .static-content {
            position: relative;
            z-index: 10;
            width: 900px;
            background: rgba(26, 15, 10, 0.85);
            backdrop-filter: blur(20px);
            padding: 100px 60px;
            border-radius: 60px;
            border: 2px solid var(--lux-gold);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .static-photo {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 8px solid var(--lux-gold);
            margin-bottom: 60px;
            object-fit: cover;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .static-title {
            font-family: 'Playfair Display', serif;
            font-size: 110px;
            color: var(--lux-gold);
            margin-bottom: 40px;
        }

        .static-msg {
            font-size: 42px;
            color: var(--cream-silk);
            line-height: 1.6;
            margin-bottom: 60px;
            max-width: 85%;
        }

        .static-footer {
            font-size: 30px;
            color: var(--cream-silk);
        }

        .static-sender {
            font-family: 'Cormorant Garamond', serif;
            font-size: 55px;
            color: var(--lux-gold);
            font-style: italic;
            display: block;
            margin-top: 20px;
        }

        /* Instagram Button Style */
        .btn-instagram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%) !important;
            color: white !important;
            border: none !important;
            padding: 18px 30px !important;
            box-shadow: 0 10px 20px rgba(220, 39, 67, 0.3) !important;
        }

        .insta-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Branding for Capture Card */
        .static-branding {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            opacity: 0.9;
        }

        .static-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .static-brand-name {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--lux-gold);
            text-transform: uppercase;
        }

        /* Ambient particles */
        .ambient-particle {
            position: absolute;
            pointer-events: none;
            z-index: var(--z-ambient);
        }

        .floating-sparkle {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: floatSparkle 3s ease-in-out infinite;
        }

        @keyframes floatSparkle {

            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.6;
            }

            50% {
                transform: translateY(-20px) scale(1.2);
                opacity: 1;
            }
        }

        /* Celebration effects */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: var(--z-celebration);
            animation: confettiFall 3s ease-in-out infinite;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .balloon {
            position: absolute;
            font-size: clamp(24px, 8vw, 36px);
            pointer-events: none;
            z-index: var(--z-celebration);
            animation: balloonFloat 4s ease-in-out infinite;
        }

        @keyframes balloonFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .donut {
            position: absolute;
            font-size: clamp(20px, 6vw, 28px);
            pointer-events: none;
            z-index: var(--z-celebration);
            animation: donutDrift 5s ease-in-out infinite;
        }

        @keyframes donutDrift {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            25% {
                transform: translate(10px, -10px) rotate(90deg);
            }

            50% {
                transform: translate(0, -20px) rotate(180deg);
            }

            75% {
                transform: translate(-10px, -10px) rotate(270deg);
            }
        }

        /* Camera zoom effect */
        .gift-container.zoomed {
            animation: cameraZoom 0.5s ease forwards;
        }

        @keyframes cameraZoom {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.05);
            }
        }

        /* Background dim */
        .dim-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: var(--z-bg);
            pointer-events: none;
        }

        .dim-overlay.active {
            opacity: 1;
        }

        /* Text particles */
        .text-sparkle {
            position: absolute;
            font-size: 12px;
            pointer-events: none;
            z-index: var(--z-message);
            animation: textSparkle 1.5s ease-in-out infinite;
        }

        @keyframes textSparkle {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Responsive adjustments */
        @media (min-width: 500px) {
            .gift-container {
                border-radius: 20px;
            }
        }

        /* ========================================
           PHOTO REVEAL ELEMENT - CANDY STYLE
           ======================================== */

        /* Photo Container - positioned in celebration scene */
        .photo-reveal-container {
            position: relative;
            margin: 0 auto 25px;
            width: fit-content;
            z-index: 10;
            opacity: 0;
            animation: textReveal 1.2s ease-out 0.3s forwards;
        }

        /* Candy Photo Frame */
        .candy-photo-frame {
            position: relative;
            width: clamp(100px, 32vw, 140px);
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 50%),
                linear-gradient(135deg, #D4A574 0%, #C4956A 25%, #E8C49A 50%, #C4956A 75%, #D4A574 100%),
                linear-gradient(180deg, #F5E6D3 0%, #E8D4C0 50%, #DCC9B8 100%);
            box-shadow:
                0 0 20px rgba(212, 175, 55, 0.3),
                0 8px 25px rgba(0, 0, 0, 0.4),
                inset 0 -3px 10px rgba(0, 0, 0, 0.1),
                inset 0 3px 10px rgba(255, 255, 255, 0.5);
            transform-origin: center center;
            transition: transform 0.3s ease;
            overflow: visible;
        }

        /* Candy sprinkle decorations */
        .candy-photo-frame::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 15% 25%, #FF6B9D 2px, transparent 2px),
                radial-gradient(circle at 85% 20%, #FFD93D 2px, transparent 2px),
                radial-gradient(circle at 75% 80%, #6BCB77 2px, transparent 2px),
                radial-gradient(circle at 20% 85%, #4D96FF 2px, transparent 2px),
                radial-gradient(circle at 50% 92%, #FF8C42 2px, transparent 2px),
                radial-gradient(circle at 90% 50%, #C9A0DC 2px, transparent 2px),
                radial-gradient(circle at 10% 55%, #95E1D3 2px, transparent 2px),
                radial-gradient(circle at 60% 10%, #F38181 2px, transparent 2px),
                radial-gradient(circle at 30% 95%, #AA96DA 2px, transparent 2px);
            pointer-events: none;
            z-index: 1;
        }

        /* Caramel shine highlight */
        .candy-photo-frame::after {
            content: '';
            position: absolute;
            top: 8%;
            left: 15%;
            width: 35%;
            height: 25%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        /* Photo image inside frame */
        .photo-image-container {
            position: absolute;
            inset: 8%;
            border-radius: 50%;
            overflow: hidden;
            background: var(--cocoa-medium);
            z-index: 0;
        }

        .photo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Photo placeholder - shown when no photo */
        .photo-placeholder {
            position: absolute;
            inset: 8%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cocoa-light) 0%, var(--cocoa-medium) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(24px, 8vw, 36px);
            z-index: 0;
        }

        /* Photo frame glow effect */
        .photo-glow {
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.4) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .candy-photo-frame:hover .photo-glow,
        .candy-photo-frame.tapped .photo-glow {
            opacity: 1;
        }

        /* Photo Sparkles */
        @keyframes sparkleBurst {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        /* Photo sparkle particles */
        .photo-sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px) drop-shadow(0 0 5px rgba(255, 215, 0, 0.8));
            opacity: 0;
            z-index: 10;
        }

        .photo-sparkle.active {
            animation: sparkleBurst 0.8s ease-out forwards;
        }

        /* Floating candy sparkles around photo */
        .floating-candy-sparkle {
            position: absolute;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }

        .floating-candy-sparkle.animate {
            animation: floatSparkleAround 3s ease-in-out infinite;
        }

        @keyframes floatSparkleAround {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg) scale(0.8);
                opacity: 0;
            }

            25% {
                opacity: 0.8;
            }

            50% {
                transform: translate(5px, -10px) rotate(180deg) scale(1);
                opacity: 0.6;
            }

            75% {
                opacity: 0.8;
            }

            100% {
                transform: translate(0, 0) rotate(360deg) scale(0.8);
                opacity: 0;
            }
        }

        /* Gold shimmer particles */
        .gold-shimmer-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--lux-gold);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(0.5px) drop-shadow(0 0 3px var(--lux-gold));
            opacity: 0;
            z-index: 5;
        }

        .gold-shimmer-particle.animate {
            animation: shimmerFloat 4s ease-in-out infinite;
        }

        @keyframes shimmerFloat {

            0%,
            100% {
                transform: translate(0, 0);
                opacity: 0;
            }

            20% {
                opacity: 0.8;
            }

            50% {
                transform: translate(8px, -15px);
                opacity: 0.5;
            }

            80% {
                opacity: 0.8;
            }

            100% {
                transform: translate(0, 0);
                opacity: 0;
            }
        }

        /* Tap interaction state */
        .candy-photo-frame.tapped {
            transform: scale(1.05);
        }

        /* Photo wrapper for proper layering */
        .photo-effects-container {
            position: absolute;
            inset: -12%;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>

<body>
    <div class="gift-container" id="giftContainer">
        <div class="cinematic-bg"></div>
        <div class="gradient-overlay"></div>
        <div class="dim-overlay" id="dimOverlay"></div>

        <!-- Ambient particles -->
        <div id="ambientParticles"
            style="position: absolute; inset: 0; pointer-events: none; z-index: var(--z-particles);"></div>

        <!-- Scene 1: Intro -->
        <div class="intro-scene" id="introScene">
            <p class="instruction-text" id="instructionText">A decadent surprise awaits…</p>
            <div class="chocolate-container" id="chocolateContainer">
                <div class="chocolate-bar" id="chocolateBar">
                    <div class="chocolate-shine"></div>
                </div>
            </div>
        </div>

        <!-- Scene 2: Chocolate Grid -->
        <div class="grid-scene" id="gridScene">
            <div class="chocolate-grid" id="chocolateGrid">
                <!-- 9 chocolate squares will be generated by JS -->
            </div>
        </div>

        <!-- Scene 3 & 4: Golden Candy & Melt -->
        <div class="melt-scene" id="meltScene">
            <!-- Melt particles will be generated by JS -->
        </div>

        <!-- Scene 5: Celebration -->
        <div class="celebration-scene" id="celebrationScene">
            <div class="birthday-card">
                <div class="birthday-message">
                    <!-- Photo Reveal Container integrated here -->
                    <div class="photo-reveal-container" id="photoRevealContainer">
                        <div class="candy-photo-frame" id="candyPhotoFrame">
                            <div class="photo-glow"></div>
                            <div class="photo-image-container" id="photoImageContainer">
                                <img data-photo class="photo-image" id="actualPhotoImage" src="" alt="Birthday photo"
                                    style="display:none;">
                                <div class="photo-placeholder" id="photoPlaceholder">🎂</div>
                            </div>
                        </div>
                        <div class="photo-effects-container" id="photoEffectsContainer"></div>
                    </div>
                    <h1 class="birthday-text" id="birthdayText">Happy Birthday!</h1>
                    <p class="birthday-subtext" id="birthdayMessage">A decadent surprise awaits from your friend...</p>
                </div>
                <div class="sender-message">
                    From ~
                    <span class="sender-name-highlight" id="senderDisplay">Sender</span>
                </div>
                <!-- Single Instagram Share Button -->
                <button class="cta-button btn-instagram" id="shareStoryBtn">
                    <svg class="insta-icon" viewBox="0 0 24 24">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.791-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4zm6.406-11.845c.796 0 1.441.645 1.441 1.44s-.645 1.44-1.441 1.44c-.795 0-1.439-.645-1.439-1.44s.644-1.44 1.439-1.44z" />
                    </svg>
                    Share to Story
                </button>
            </div>
            <div id="celebrationElements"></div>

            <div id="captureLoading">
                <div class="capture-spinner"></div>
                <h2>Saving to Story...</h2>
                <p style="opacity: 0.7; margin-top: 10px;">Capturing your special moment</p>
            </div>
        </div>
    </div>

    <!-- Hidden Static Card for Capture -->
    <div id="staticCaptureContainer">
        <div class="static-card">
            <div class="static-content">
                <img id="staticPhoto" class="static-photo" src="" alt="Birthday photo">
                <h1 class="static-title" id="staticTitle">Happy Birthday!</h1>
                <p class="static-msg" id="staticMessage"></p>
                <div class="static-footer">
                    From ~
                    <span class="static-sender" id="staticSender"></span>
                </div>
            </div>

            <!-- Capture-only branding -->
            <div class="static-branding">
                <img src="../../../logo.png" class="static-logo" alt="Logo">
                <div class="static-brand-name">GiftOnScreen</div>
            </div>
        </div>
    </div>

    <script>
        // Preview Mode - Full game logic with placeholder data
        // State management
        const state = {
            currentScene: 1,
            tappedSquares: [],
            goldenCandyFound: false,
            goldenCandyTapped: false,
            allSquaresBroken: false,
            animationInProgress: false,
            recipientName: '{Receiver Name}',
            senderName: '{Sender Name}',
            message: '{Your Message}'
        };

        // Surprise items
        const surprises = ['🍬', '🎈', '✨', '❤️', '⭐', '🌸', '🍭', '🫧'];

        // DOM Elements
        const elements = {
            giftContainer: document.getElementById('giftContainer'),
            introScene: document.getElementById('introScene'),
            chocolateContainer: document.getElementById('chocolateContainer'),
            chocolateBar: document.getElementById('chocolateBar'),
            instructionText: document.getElementById('instructionText'),
            gridScene: document.getElementById('gridScene'),
            chocolateGrid: document.getElementById('chocolateGrid'),
            meltScene: document.getElementById('meltScene'),
            celebrationScene: document.getElementById('celebrationScene'),
            birthdayText: document.getElementById('birthdayText'),
            birthdayMessage: document.getElementById('birthdayMessage'),
            senderDisplay: document.getElementById('senderDisplay'),
            dimOverlay: document.getElementById('dimOverlay'),
            ambientParticles: document.getElementById('ambientParticles'),
            celebrationElements: document.getElementById('celebrationElements'),
            // Photo reveal elements
            photoRevealContainer: document.getElementById('photoRevealContainer'),
            candyPhotoFrame: document.getElementById('candyPhotoFrame'),
            photoImageContainer: document.getElementById('photoImageContainer'),
            photoPlaceholder: document.getElementById('photoPlaceholder'),
            photoEffectsContainer: document.getElementById('photoEffectsContainer')
        };

        // Initialize luxury gold dust particles
        function createAmbientParticles() {
            const count = 25;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'ambient-particle';
                particle.style.cssText = `
                    position: absolute;
                    width: ${Math.random() * 4 + 1}px;
                    height: ${Math.random() * 4 + 1}px;
                    background: var(--lux-gold);
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    opacity: ${Math.random() * 0.5 + 0.2};
                    filter: blur(1px) drop-shadow(0 0 5px var(--lux-gold));
                    pointer-events: none;
                `;

                elements.ambientParticles.appendChild(particle);

                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 0.2 },
                    { transform: `translate(${(Math.random() - 0.5) * 100}px, ${(Math.random() - 0.5) * 100}px) scale(1.5)`, opacity: 0.8 },
                    { transform: 'translate(0, 0) scale(1)', opacity: 0.2 }
                ], {
                    duration: 3000 + Math.random() * 5000,
                    iterations: Infinity,
                    easing: 'ease-in-out'
                });
            }
        }

        // Create chocolate grid
        function createChocolateGrid() {
            elements.chocolateGrid.innerHTML = '';
            const goldenIndex = Math.floor(Math.random() * 9);

            for (let i = 0; i < 9; i++) {
                const square = document.createElement('div');
                square.className = 'chocolate-square';
                square.dataset.index = i;
                square.style.animationDelay = (i * 0.1) + 's';

                // Create surprise item
                const surprise = document.createElement('div');
                surprise.className = 'surprise-item';

                if (i === goldenIndex) {
                    surprise.textContent = '💎';
                    surprise.classList.add('golden-candy');
                    square.dataset.golden = 'true';
                    state.goldenCandyFound = true;
                } else {
                    const extraSurprises = ['✨', '🌟', '💫', '⭐', '💍', '🥂'];
                    surprise.textContent = extraSurprises[Math.floor(Math.random() * extraSurprises.length)];
                }

                square.appendChild(surprise);

                // Tap event
                square.addEventListener('click', handleSquareTap);
                square.addEventListener('touchend', handleSquareTap);

                elements.chocolateGrid.appendChild(square);
            }
        }

        // Handle chocolate square tap
        function handleSquareTap(e) {
            e.preventDefault();
            if (state.animationInProgress) return;

            const square = e.currentTarget;
            if (square.classList.contains('cracked')) return;

            state.animationInProgress = true;
            square.classList.add('tapped');

            // Create crumbs
            createCrumbs(square);

            setTimeout(() => {
                square.classList.remove('tapped');
                square.classList.add('cracked');
                state.tappedSquares.push(square.dataset.index);

                // Check if golden candy
                if (square.dataset.golden === 'true' && !state.goldenCandyTapped) {
                    setTimeout(() => handleGoldenCandyTap(square), 500);
                }

                // Check if all squares broken
                if (state.tappedSquares.length === 9) {
                    state.allSquaresBroken = true;
                    setTimeout(startChocolateMelt, 800);
                }

                state.animationInProgress = false;
            }, 150);
        }

        // Create chocolate crumbs
        function createCrumbs(square) {
            const rect = square.getBoundingClientRect();
            const containerRect = elements.giftContainer.getBoundingClientRect();

            for (let i = 0; i < 8; i++) {
                const crumb = document.createElement('div');
                crumb.className = 'crumb';
                crumb.style.left = (rect.left - containerRect.left + rect.width / 2 + (Math.random() - 0.5) * 40) + 'px';
                crumb.style.top = (rect.top - containerRect.top + rect.height / 2) + 'px';
                crumb.style.background = Math.random() > 0.5 ? '#1A0F0A' : '#2C1B12';
                crumb.style.width = (3 + Math.random() * 5) + 'px';
                crumb.style.height = crumb.style.width;

                elements.giftContainer.appendChild(crumb);

                // Animate crumb falling with physics-like feel
                const endX = (Math.random() - 0.5) * 80;
                const endY = 150 + Math.random() * 100;

                crumb.animate([
                    { transform: 'translate(0, 0) rotate(0deg) scale(1)', opacity: 1 },
                    { transform: `translate(${endX}px, ${endY}px) rotate(${Math.random() * 720}deg) scale(0)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 400,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                }).onfinish = () => crumb.remove();
            }
        }

        // Handle golden candy tap
        function handleGoldenCandyTap(square) {
            state.goldenCandyTapped = true;
            state.animationInProgress = true;

            const candy = square.querySelector('.surprise-item');
            candy.classList.add('tapped');

            // Create sparkle burst
            createSparkleBurst(candy);

            // Camera zoom effect
            elements.giftContainer.classList.add('zoomed');
            elements.dimOverlay.classList.add('active');

            setTimeout(() => {
                elements.giftContainer.classList.remove('zoomed');
                elements.dimOverlay.classList.remove('active');

                // If not all broken yet, wait for rest
                if (state.tappedSquares.length < 9) {
                    state.animationInProgress = false;
                }
            }, 800);
        }

        // Create sparkle burst
        function createSparkleBurst(element) {
            const rect = element.getBoundingClientRect();
            const containerRect = elements.giftContainer.getBoundingClientRect();
            const centerX = rect.left - containerRect.left + rect.width / 2;
            const centerY = rect.top - containerRect.top + rect.height / 2;

            for (let i = 0; i < 12; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = centerX + 'px';
                sparkle.style.top = centerY + 'px';

                const angle = (i / 12) * Math.PI * 2;
                const distance = 50 + Math.random() * 30;
                sparkle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                sparkle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');

                elements.giftContainer.appendChild(sparkle);

                setTimeout(() => sparkle.remove(), 800);
            }
        }

        // Start chocolate melt
        function startChocolateMelt() {
            state.animationInProgress = true;

            // Hide grid scene
            elements.gridScene.classList.remove('active');
            elements.meltScene.classList.add('active');

            const squares = document.querySelectorAll('.chocolate-square');
            const containerRect = elements.giftContainer.getBoundingClientRect();
            const centerX = containerRect.width / 2;
            const centerY = containerRect.height / 2;

            // Create melt particles from each square
            squares.forEach((square, index) => {
                const rect = square.getBoundingClientRect();

                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        const particle = document.createElement('div');
                        particle.className = 'melt-particle';
                        particle.style.left = (rect.left - containerRect.left + rect.width / 2) + 'px';
                        particle.style.top = (rect.top - containerRect.top + rect.height / 2) + 'px';
                        particle.style.width = (10 + Math.random() * 15) + 'px';
                        particle.style.height = particle.style.width;
                        particle.style.background = 'var(--cocoa-light)';
                        particle.style.filter = 'drop-shadow(0 0 10px rgba(0,0,0,0.5))';

                        elements.giftContainer.appendChild(particle);

                        // Animate toward center
                        const endX = centerX + (Math.random() - 0.5) * 50;
                        const endY = centerY + (Math.random() - 0.5) * 30;

                        particle.animate([
                            {
                                transform: 'translate(0, 0) scale(1)',
                                opacity: 1,
                                filter: 'blur(0px)'
                            },
                            {
                                transform: `translate(${endX - parseFloat(particle.style.left)}px, ${endY - parseFloat(particle.style.top)}px) scale(0)`,
                                opacity: 0,
                                filter: 'blur(5px)'
                            }
                        ], {
                            duration: 1000 + Math.random() * 500,
                            easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                        }).onfinish = () => {
                            particle.remove();
                            // Start celebration when all particles done
                            if (index === squares.length - 1 && i === 7) {
                                setTimeout(startCelebration, 300);
                            }
                        };
                    }, index * 50 + i * 30);
                }
            });
        }

        // Start celebration
        function startCelebration() {
            elements.meltScene.classList.remove('active');
            elements.celebrationScene.classList.add('active');

            // Update text with names
            elements.birthdayText.textContent = `Happy Birthday ${state.recipientName}!`;
            elements.birthdayMessage.textContent = state.message;
            elements.senderDisplay.textContent = state.senderName;

            // Create celebration elements
            createCelebrationElements();
            createTextSparkles();
            createGoldDust();

            // Create photo particles immediately
            createPhotoParticles();
        }

        // ========================================
        // PHOTO REVEAL FUNCTIONS
        // ========================================

        // Create floating particles around the photo
        function createPhotoParticles() {
            const container = elements.photoEffectsContainer;
            const frameSize = elements.candyPhotoFrame.offsetWidth;

            // Create floating candy sparkles
            const candyEmojis = ['✨', '⭐', '💫', '🫧', '🍬'];
            for (let i = 0; i < 5; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'floating-candy-sparkle';
                sparkle.textContent = candyEmojis[i % candyEmojis.length];

                // Position around the frame
                const angle = (i / 5) * Math.PI * 2;
                const distance = frameSize * 0.6;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                sparkle.style.left = `calc(50% + ${x}px)`;
                sparkle.style.top = `calc(50% + ${y}px)`;
                sparkle.style.animationDelay = `${Math.random() * 2}s`;

                container.appendChild(sparkle);

                // Start animation after a brief delay
                setTimeout(() => {
                    sparkle.classList.add('animate');
                }, 500 + Math.random() * 1000);
            }

            // Create gold shimmer particles
            for (let i = 0; i < 6; i++) {
                const shimmer = document.createElement('div');
                shimmer.className = 'gold-shimmer-particle';

                // Position around the frame
                const angle = (i / 6) * Math.PI * 2 + Math.random() * 0.5;
                const distance = frameSize * 0.5 + Math.random() * frameSize * 0.2;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                shimmer.style.left = `calc(50% + ${x}px)`;
                shimmer.style.top = `calc(50% + ${y}px)`;
                shimmer.style.animationDelay = `${Math.random() * 3}s`;

                container.appendChild(shimmer);

                // Start animation after a brief delay
                setTimeout(() => {
                    shimmer.classList.add('animate');
                }, 800 + Math.random() * 1500);
            }
        }

        // Handle photo tap interaction
        function handlePhotoTap() {
            const frame = elements.candyPhotoFrame;

            // Add tapped state
            frame.classList.add('tapped');

            // Create sparkle burst effect
            createPhotoSparkleBurst();

            // Remove tapped state after animation
            setTimeout(() => {
                frame.classList.remove('tapped');
            }, 300);
        }

        // Create sparkle burst when photo is tapped
        function createPhotoSparkleBurst() {
            const rect = elements.candyPhotoFrame.getBoundingClientRect();
            const containerRect = elements.giftContainer.getBoundingClientRect();
            const centerX = rect.left - containerRect.left + rect.width / 2;
            const centerY = rect.top - containerRect.top + rect.height / 2;

            const sparkles = ['✨', '⭐', '💫', '🫧'];

            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'photo-sparkle';
                sparkle.style.left = centerX + 'px';
                sparkle.style.top = centerY + 'px';

                const angle = (i / 8) * Math.PI * 2;
                const distance = 40 + Math.random() * 20;
                sparkle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                sparkle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');

                elements.giftContainer.appendChild(sparkle);

                // Add emoji sparkles
                const emojiSparkle = document.createElement('div');
                emojiSparkle.style.cssText = `
                    position: absolute;
                    left: ${centerX + Math.cos(angle) * distance}px;
                    top: ${centerY + Math.sin(angle) * distance}px;
                    font-size: 16px;
                    pointer-events: none;
                    z-index: 20;
                    animation: sparkleBurst 0.6s ease-out forwards;
                `;
                emojiSparkle.textContent = sparkles[i % sparkles.length];
                elements.giftContainer.appendChild(emojiSparkle);

                setTimeout(() => {
                    sparkle.remove();
                    emojiSparkle.remove();
                }, 800);
            }
        }

        // Update photo with actual image
        function updatePhoto(photoUrl) {
            console.log("Chocolate Template: Updating photo with URL:", photoUrl);
            if (!photoUrl) return;

            // Find the photo image element
            const img = document.getElementById('actualPhotoImage');
            if (img) {
                img.src = photoUrl;
                img.onload = () => {
                    img.style.display = 'block';
                    if (elements.photoPlaceholder) elements.photoPlaceholder.style.display = 'none';
                };
            }
        }

        // Create high-end celebration elements
        function createCelebrationElements() {
            const colors = ['#D4AF37', '#B8860B', '#F8F4E3'];

            // Gold Leaf Confetti
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.cssText = `
                        position: absolute;
                        width: ${Math.random() * 8 + 4}px;
                        height: ${Math.random() * 8 + 4}px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: ${Math.random() * 100}%;
                        top: -50px;
                        z-index: 1000;
                        opacity: ${Math.random() * 0.5 + 0.5};
                        filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
                    `;

                    if (Math.random() > 0.5) confetti.style.borderRadius = '2px';
                    else confetti.style.borderRadius = '50%';

                    elements.celebrationElements.appendChild(confetti);

                    confetti.animate([
                        { transform: 'translateY(0) rotate(0deg) skew(0deg)', opacity: 1 },
                        { transform: `translateY(100vh) rotate(${Math.random() * 1080}deg) skew(${Math.random() * 40}deg)`, opacity: 0 }
                    ], {
                        duration: 3000 + Math.random() * 3000,
                        easing: 'cubic-bezier(0.1, 0, 0.3, 1)'
                    }).onfinish = () => confetti.remove();
                }, i * 100);
            }
        }

        // Create sparkles around text
        function createTextSparkles() {
            const sparkles = ['✨', '⭐', '💫', '🌟'];

            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'text-sparkle';
                sparkle.textContent = sparkles[i % sparkles.length];

                const angle = (i / 8) * Math.PI * 2;
                const x = 50 + Math.cos(angle) * 8;
                const y = 25 + Math.sin(angle) * 3;

                sparkle.style.left = x + '%';
                sparkle.style.top = y + '%';
                sparkle.style.animationDelay = Math.random() * 1.5 + 's';

                elements.celebrationElements.appendChild(sparkle);
            }
        }

        // Create gold dust around text
        function createGoldDust() {
            const colors = ['#D4AF37', '#F8F4E3', '#B8860B'];
            for (let i = 0; i < 40; i++) {
                const sparkle = document.createElement('div');
                sparkle.style.cssText = `
                    position: absolute;
                    width: ${Math.random() * 3}px;
                    height: ${Math.random() * 3}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    pointer-events: none;
                    filter: blur(0.5px);
                `;
                elements.celebrationElements.appendChild(sparkle);

                sparkle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${(Math.random() - 0.5) * 200}px, ${-Math.random() * 300}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: 2000 + Math.random() * 3000,
                    easing: 'cubic-bezier(0, 0, 0.2, 1)',
                    iterations: Infinity
                });
            }
        }

        // Scene transitions
        function transitionToGrid() {
            elements.chocolateBar.style.transform = 'scale(0.8) translateZ(-100px)';
            elements.chocolateBar.style.opacity = '0';
            elements.instructionText.style.opacity = '0';

            setTimeout(() => {
                elements.introScene.classList.add('hidden');
                elements.gridScene.classList.add('active');
                createChocolateGrid();
                elements.instructionText.textContent = 'Uncover the hidden golden nugget…';
                elements.instructionText.style.opacity = '1';
                elements.instructionText.style.top = '8%';
            }, 600);
        }

        // Function to display data - can be called by parent app
        // Preview mode: uses placeholder data
        window.displayFirebaseData = function () {
            console.log("Chocolate Preview: Displaying data with placeholders");

            const data = window.GOS_DATA || {};

            if (data.receiver) {
                state.recipientName = data.receiver;
                if (elements.celebrationScene.classList.contains('active')) {
                    elements.birthdayText.textContent = `Happy Birthday ${state.recipientName}!`;
                }
            }

            if (data.sender) {
                state.senderName = data.sender;
                if (elements.celebrationScene.classList.contains('active')) {
                    elements.senderDisplay.textContent = state.senderName;
                }
            }

            if (data.message) {
                state.message = data.message;
                if (elements.celebrationScene.classList.contains('active')) {
                    elements.birthdayMessage.textContent = state.message;
                }
            }

            if (data.photoUrl || data.photo) {
                updatePhoto(data.photoUrl || data.photo);
            }

            // Sync with static card
            document.getElementById('staticTitle').textContent = `Happy Birthday ${state.recipientName}!`;
            document.getElementById('staticMessage').textContent = state.message;
            document.getElementById('staticSender').textContent = state.senderName;
            const sPhoto = document.getElementById('staticPhoto');
            if (data.photoUrl || data.photo) {
                sPhoto.src = data.photoUrl || data.photo;
            } else {
                sPhoto.style.display = 'none';
            }
        };

        // Initialize
        function init() {
            createAmbientParticles();

            // 3D Tilt Effect
            elements.giftContainer.addEventListener('mousemove', (e) => {
                const rect = elements.giftContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;

                elements.giftContainer.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            elements.giftContainer.addEventListener('touchmove', (e) => {
                const rect = elements.giftContainer.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;

                elements.giftContainer.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            elements.giftContainer.addEventListener('mouseleave', () => {
                elements.giftContainer.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            });

            elements.giftContainer.addEventListener('touchend', () => {
                elements.giftContainer.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            });

            // Initial chocolate tap
            elements.chocolateContainer.addEventListener('click', () => {
                if (state.currentScene === 1) {
                    state.currentScene = 2;
                    transitionToGrid();
                }
            });

            // Photo tap event listener
            elements.candyPhotoFrame.addEventListener('click', handlePhotoTap);
            elements.candyPhotoFrame.addEventListener('touchend', handlePhotoTap);
        }

        // Listen for content updates from parent app (via postMessage)
        window.addEventListener('message', (event) => {
            const { type, data } = event.data;
            if (type === 'UPDATE_CONTENT') {
                window.GOS_DATA = {
                    ...window.GOS_DATA,
                    ...data,
                    photoUrl: data.photo || data.photoUrl || (window.GOS_DATA ? window.GOS_DATA.photoUrl : null)
                };
                window.displayFirebaseData();
            }
        });

        // Start
        init();
    </script>
</body>

</html>
