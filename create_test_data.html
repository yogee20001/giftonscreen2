<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inject Test Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Compat for Local Execution -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="./firebase-config.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-8">

    <div class="max-w-md w-full bg-zinc-900 border border-zinc-800 p-8 rounded-3xl text-center">
        <h1 class="text-3xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-pink-500 text-transparent bg-clip-text">Test Data Injector</h1>
        <p class="text-zinc-400 mb-8 max-w-sm mx-auto">Clicking the button below will securely write an active sample document to your Firestore database.</p>
        
        <button id="injectBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 px-8 rounded-xl transition-all shadow-lg hover:shadow-blue-500/30 w-full mb-6 relative overflow-hidden group">
            <span class="relative z-10 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Inject Test Data
            </span>
        </button>

        <div id="result" class="hidden text-left bg-zinc-950 border border-zinc-800 rounded-xl p-4">
            <p class="text-green-400 font-medium flex items-center gap-2 mb-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Success! Document created.
            </p>
            <p class="text-sm text-zinc-400 mb-1">Your Test Gift ID is:</p>
            <code id="giftIdDisplay" class="block bg-black p-3 rounded text-pink-400 font-mono text-lg mb-4 text-center cursor-pointer hover:bg-zinc-900 transition-colors" title="Click to copy">
                ...
            </code>
            <a id="testLink" href="#" target="_blank" class="block w-full text-center bg-zinc-800 hover:bg-zinc-700 text-white py-3 rounded-lg text-sm font-semibold transition-colors">
                Open Ritual Template ↗
            </a>
        </div>
        
        <p id="errorBox" class="text-red-400 mt-4 text-sm hidden"></p>
    </div>

    <script>
        document.getElementById('injectBtn').addEventListener('click', async () => {
            const btn = document.getElementById('injectBtn');
            const resultBox = document.getElementById('result');
            const errorBox = document.getElementById('errorBox');
            
            btn.innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Writing Data...</span>';
            btn.disabled = true;
            btn.classList.add('opacity-75');

            const testGiftId = 'TEST-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            const testData = {
                status: 'active', // 'active' bypasses the activation gate
                template: 'ritual',
                receiverName: 'Isabella',
                senderName: 'Antigravity',
                message: 'To the girl with stars in her eyes: May this birthday bring you everything you\'ve ever wished for, and may you never stop dreaming. 🌟',
                // Unsplash premium 9:16 portrait test photo
                photoURL: 'https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=735&auto=format&fit=crop', 
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                // Assuming db is on the global scope via firebase-config.js
                await db.collection('gifts').doc(testGiftId).set(testData);
                
                document.getElementById('giftIdDisplay').textContent = testGiftId;
                document.getElementById('testLink').href = `./templates/bday/ritual/index.html?id=${testGiftId}`;
                
                // Copy ID to clipboard on click
                document.getElementById('giftIdDisplay').onclick = () => {
                    navigator.clipboard.writeText(testGiftId);
                    alert("Copied ID: " + testGiftId);
                }

                btn.style.display = 'none';
                resultBox.classList.remove('hidden');

            } catch (err) {
                console.error("Firestore Error:", err);
                // Try alternate initializion if db is missing globally
                errorBox.textContent = `Error: ${err.message}. Check console for details. Make sure your firebase-config.js allows writes without Auth for this test.`;
                errorBox.classList.remove('hidden');
                
                btn.innerHTML = 'Inject Test Data';
                btn.disabled = false;
                btn.classList.remove('opacity-75');
            }
        });
    </script>
</body>
</html>
